<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Modération des mèmes · ElBot</title><style>body{margin:0;background:#071426;color:#eaf2ff;font:15px Arial,sans-serif}.wrap{max-width:950px;margin:auto;padding:24px}.head,.card{background:#0d2039;border:1px solid #244467;border-radius:16px;padding:16px;margin-bottom:12px}.head{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}button,.login{border:0;border-radius:10px;padding:10px 14px;font-weight:800;cursor:pointer;text-decoration:none}.refresh,.approve{background:#20d76b;color:#04140b}.reject{background:#fa4965;color:white}.login{display:inline-block;background:#53fc18;color:#071207}.meta{color:#9db0c9;font-size:12px}.media{color:#63d5ff}.actions{display:flex;gap:8px;margin-top:12px}.empty{text-align:center;color:#9db0c9;padding:35px}</style></head><body><main class="wrap"><div class="head"><div><h1>🛡️ Modération des mèmes</h1><div id="identity" class="meta">Vérification Kick…</div></div><button class="refresh" onclick="load()">↻ Actualiser</button></div><div id="content"></div></main><script>
const slug=decodeURIComponent(location.pathname.split('/').filter(Boolean).pop()||'');const content=document.getElementById('content'),identity=document.getElementById('identity');const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
async function load(){content.innerHTML='<div class="empty">Chargement…</div>';const r=await fetch('/api/public/memes-moderation/'+encodeURIComponent(slug)+'?ts='+Date.now(),{cache:'no-store',credentials:'same-origin'}),j=await r.json();if(r.status===401&&j.authUrl){identity.textContent='Connexion Kick obligatoire';content.innerHTML='<div class="card"><p>Ce portail est réservé aux modérateurs confirmés de cette chaîne.</p><a class="login" href="'+esc(j.authUrl)+'">Se connecter avec Kick</a></div>';return}if(!r.ok){content.innerHTML='<div class="card">'+esc(j.error||'Accès refusé')+'</div>';return}identity.textContent='@'+j.data.username+' · modérateur vérifié de '+j.data.streamer;render(j.data.submissions||[])}
function render(rows){const labels={pending:'⏳ En attente',approved:'✅ Validé',rejected:'❌ Refusé'};content.innerHTML=rows.length?rows.map(x=>{const actions=x.status==='pending'?`<div class="actions"><button class="approve" onclick="review(${Number(x.id)},'approve')">Valider</button><button class="reject" onclick="review(${Number(x.id)},'reject')">Refuser</button></div>`:'';return `<div class="card"><b>@${esc(x.username)}</b> · ${labels[x.status]||esc(x.status)}<div class="meta">${esc(new Date(String(x.created_at).replace(' ','T')+'Z').toLocaleString('fr-FR'))} · identité Kick ${x.kick_user_id?'vérifiée':'ancienne'}</div><p>${esc(x.text||'Sans texte')}</p><a class="media" href="${esc(x.media_url)}" target="_blank" rel="noopener">Voir le média</a>${actions}</div>`}).join(''):'<div class="empty">Aucun mème durant les dernières 24 heures.</div>'}
async function review(id,action){const r=await fetch(`/api/public/memes-moderation/${encodeURIComponent(slug)}/${id}/${action}`,{method:'POST',credentials:'same-origin'}),j=await r.json();if(!r.ok)alert(j.error||'Action impossible');await load()}load();
</script></body></html>
