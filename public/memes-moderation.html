<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Modération des mèmes · ElBot</title><style>body{margin:0;background:#071426;color:#eaf2ff;font:14px Arial,sans-serif}.wrap{max-width:950px;margin:auto;padding:20px}.head,.tools,.row{background:#0d2039;border:1px solid #244467;border-radius:13px;padding:12px;margin-bottom:8px}.head,.tools,.row,.pager{display:flex;align-items:center;gap:10px;flex-wrap:wrap}.head{justify-content:space-between}.tools{justify-content:space-between}.row .who{min-width:125px;font-weight:800}.row .text{flex:1;min-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.meta{color:#9db0c9;font-size:11px}.media{color:#63d5ff}button,.login,select{border:0;border-radius:8px;padding:8px 11px;font-weight:800;cursor:pointer;text-decoration:none}.refresh,.approve{background:#20d76b;color:#04140b}.reject{background:#fa4965;color:white}.login{display:inline-block;background:#53fc18;color:#071207}.pager{justify-content:center;margin-top:12px}.pager button:disabled{opacity:.4}.empty{text-align:center;color:#9db0c9;padding:35px}</style></head><body><main class="wrap"><div class="head"><div><h2>🛡️ Modération des mèmes</h2><div id="identity" class="meta">Vérification Kick…</div></div><button class="refresh" onclick="load()">↻ Actualiser</button></div><div id="mode-tools" class="tools" hidden><b>Mode des mèmes</b><select id="mode" onchange="saveMode()"><option value="trust">Confiance</option><option value="approval">Validation</option><option value="instant">Instantané</option></select></div><div id="content"></div><div id="pager" class="pager"></div></main><script>
const slug=decodeURIComponent(location.pathname.split('/').filter(Boolean).pop()||''),content=document.getElementById('content'),identity=document.getElementById('identity');let rows=[],page=1;const perPage=10,esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
async function load(){content.innerHTML='<div class="empty">Chargement…</div>';const r=await fetch('/api/public/memes-moderation/'+encodeURIComponent(slug)+'?ts='+Date.now(),{cache:'no-store',credentials:'same-origin'}),j=await r.json();if(r.status===401&&j.authUrl){identity.textContent='Connexion Kick obligatoire';content.innerHTML='<div class="row"><span>Portail réservé aux modérateurs confirmés.</span><a class="login" href="'+esc(j.authUrl)+'">Se connecter avec Kick</a></div>';return}if(!r.ok){content.innerHTML='<div class="row">'+esc(j.error||'Accès refusé')+'</div>';return}identity.textContent='@'+j.data.username+' · modérateur vérifié de '+j.data.streamer;document.getElementById('mode-tools').hidden=false;document.getElementById('mode').value=j.data.mode||'trust';rows=j.data.submissions||[];page=Math.min(page,Math.max(1,Math.ceil(rows.length/perPage)));render()}
function render(){const labels={pending:'⏳',approved:'✅',rejected:'❌'},visible=rows.slice((page-1)*perPage,page*perPage);content.innerHTML=visible.length?visible.map(x=>`<div class="row"><span>${labels[x.status]||''}</span><span class="who">@${esc(x.username)}</span><span class="text" title="${esc(x.text||'Sans texte')}">${esc(x.text||'Sans texte')}</span><span class="meta">${esc(new Date(String(x.created_at).replace(' ','T')+'Z').toLocaleString('fr-FR'))}</span><a class="media" href="${esc(x.media_url)}" target="_blank" rel="noopener">Média</a>${x.status==='pending'?`<button class="approve" onclick="review(${Number(x.id)},'approve')">Valider</button><button class="reject" onclick="review(${Number(x.id)},'reject')">Refuser</button>`:''}</div>`).join(''):'<div class="empty">Aucun mème durant les dernières 24 heures.</div>';const pages=Math.max(1,Math.ceil(rows.length/perPage));document.getElementById('pager').innerHTML=pages>1?`<button ${page<=1?'disabled':''} onclick="page--;render()">←</button><b>${page} / ${pages}</b><button ${page>=pages?'disabled':''} onclick="page++;render()">→</button>`:''}
async function review(id,action){const r=await fetch(`/api/public/memes-moderation/${encodeURIComponent(slug)}/${id}/${action}`,{method:'POST',credentials:'same-origin'}),j=await r.json();if(!r.ok)alert(j.error||'Action impossible');await load()}
async function saveMode(){const mode=document.getElementById('mode').value,r=await fetch('/api/public/memes-moderation/'+encodeURIComponent(slug)+'/mode',{method:'POST',credentials:'same-origin',headers:{'Content-Type':'application/json'},body:JSON.stringify({mode})}),j=await r.json();if(!r.ok)alert(j.error||'Mode impossible')}load();
</script></body></html>
