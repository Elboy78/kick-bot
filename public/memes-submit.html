<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Envoyer un meme · ElBot</title><style>*{box-sizing:border-box}body{margin:0;min-height:100vh;background:#071426;color:#eef6ff;font-family:Inter,Arial;display:grid;place-items:center;padding:20px}.box{width:min(620px,100%);background:#0c1d35;border:1px solid #21466f;border-radius:20px;padding:24px;box-shadow:0 24px 70px #0008}h1{margin:0 0 5px}p{color:#9eb1ca}.inp{width:100%;padding:13px;margin:6px 0 14px;border-radius:10px;border:1px solid #294a70;background:#07162b;color:white}button{width:100%;padding:14px;border:0;border-radius:11px;background:#23dc70;color:#02150a;font-weight:900;cursor:pointer}img{display:none;max-width:100%;max-height:300px;margin:10px auto;border-radius:12px}#caption{display:none;text-align:center;padding:10px;background:#050b13;color:#fff;font-size:24px;font-weight:900;border-radius:10px;margin:8px 0 14px}#msg{margin-top:12px;font-weight:800}.ok{color:#4cff8b}.err{color:#ff7185}</style></head><body><main class="box"><h1>😂 Envoyer un meme</h1><p id="channel">Chargement…</p><label>Image ou GIF</label><input class="inp" id="file" type="file" accept="image/png,image/jpeg,image/webp,image/gif"><img id="preview"><div id="caption"></div><label>Ton texte</label><input class="inp" id="text" maxlength="160" placeholder="Texte affiché avec le meme"><button id="send">Envoyer sur le live</button><div id="msg"></div></main><script>const slug=location.pathname.split('/').filter(Boolean).pop(),token=new URLSearchParams(location.search).get('token')||'',file=document.getElementById('file'),preview=document.getElementById('preview');let cfg={};fetch('/api/public/memes/'+encodeURIComponent(slug)+'/config?ts='+Date.now()+'&token='+encodeURIComponent(token),{cache:'no-store'}).then(r=>r.json()).then(j=>{cfg=j.data||{};document.getElementById('channel').textContent='Chaîne : '+(cfg.streamer||slug)+' · '+(cfg.maxFileMb||5)+' Mo maximum';document.getElementById('text').maxLength=cfg.maxText||100});document.getElementById('text').oninput=e=>{const c=document.getElementById('caption');c.textContent=e.target.value;c.style.display=e.target.value?'block':'none'};file.onchange=()=>{const f=file.files[0];if(f){preview.src=URL.createObjectURL(f);preview.style.display='block'}};document.getElementById('send').onclick=()=>{const f=file.files[0],msg=document.getElementById('msg');if(!f)return msg.textContent='Choisis une image ou un GIF.';const rd=new FileReader;rd.onload=async()=>{const r=await fetch('/api/public/memes/'+encodeURIComponent(slug)+'/submit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,text:document.getElementById('text').value,image:rd.result})}),j=await r.json();msg.className=r.ok?'ok':'err';msg.textContent=r.ok?(j.status==='approved'?'Meme envoyé sur le live !':'Meme envoyé pour validation.'):(j.error||'Erreur')};rd.readAsDataURL(f)};</script></body></html>
