<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Envoyer un mème · ElBot</title>
<style>*{box-sizing:border-box}body{margin:0;min-height:100vh;background:#071426;color:#eef6ff;font-family:Inter,Arial;display:grid;place-items:center;padding:20px}.box{width:min(620px,100%);background:#0c1d35;border:1px solid #21466f;border-radius:20px;padding:24px;box-shadow:0 24px 70px #0008}h1{margin:0 0 5px}p{color:#9eb1ca;line-height:1.5}.inp{width:100%;padding:13px;margin:6px 0 14px;border-radius:10px;border:1px solid #294a70;background:#07162b;color:white}button,.kick-login{width:100%;padding:14px;border:0;border-radius:11px;background:#23dc70;color:#02150a;font-weight:900;cursor:pointer;text-align:center;text-decoration:none;display:block}button:disabled{opacity:.55;cursor:wait}img,video{display:none;max-width:100%;max-height:300px;margin:10px auto;border-radius:12px}#caption{display:none;text-align:center;padding:10px;background:#050b13;color:#fff;font-size:24px;font-weight:900;border-radius:10px;margin:8px 0 14px}.check{display:flex;gap:10px;align-items:center;margin:2px 0 16px;padding:12px;border:1px solid #294a70;border-radius:10px}.check input{width:20px;height:20px}#msg{margin-top:12px;font-weight:800}.ok{color:#4cff8b}.err{color:#ff7185}.identity{padding:12px;margin:12px 0 18px;border:1px solid #225487;border-radius:12px;background:#08182d;color:#b9d5f4;font-weight:800}#form,#auth-gate{display:none}</style></head>
<body><main class="box"><h1>😂 Envoyer un mème</h1><p id="channel">Vérification du lien…</p><section id="auth-gate"><div class="identity" id="expected-user"></div><p>Connecte-toi avec le compte Kick indiqué. Aucun autre compte ne pourra utiliser ce lien personnel.</p><a class="kick-login" id="kick-login" href="#">Se connecter avec Kick</a></section><section id="form"><div class="identity" id="connected-user"></div><label>Image, GIF ou vidéo MP4/WebM</label><input class="inp" id="file" type="file" accept="image/png,image/jpeg,image/webp,image/gif,video/mp4,video/webm"><img id="image-preview"><video id="video-preview" controls muted playsinline></video><div id="caption"></div><label>Ton texte</label><input class="inp" id="text" maxlength="160" placeholder="Texte affiché sous le mème"><label class="check" id="tts-row" hidden><input type="checkbox" id="read-text"><span>🔊 Faire lire mon texte par la voix IA</span></label><div id="voice-row" hidden><label>Voix utilisée</label><select class="inp" id="voice"></select></div><button id="send">Envoyer sur le live</button></section><div id="msg"></div></main>
<script>
const slug=location.pathname.split('/').filter(Boolean).pop(),token=new URLSearchParams(location.search).get('token')||'',file=document.getElementById('file'),imagePreview=document.getElementById('image-preview'),videoPreview=document.getElementById('video-preview'),send=document.getElementById('send');let cfg={},videoDuration=0,objectUrl='';
function show(text,ok){const msg=document.getElementById('msg');msg.className=ok?'ok':'err';msg.textContent=text}
async function boot(){try{const r=await fetch('/api/public/memes/'+encodeURIComponent(slug)+'/config?ts='+Date.now()+'&token='+encodeURIComponent(token),{cache:'no-store',credentials:'same-origin'}),j=await r.json();if(r.status===401&&j.authUrl){document.getElementById('channel').textContent='Connexion Kick obligatoire';document.getElementById('expected-user').textContent='Lien réservé à @'+(j.expectedUsername||'viewer');document.getElementById('kick-login').href=j.authUrl;document.getElementById('auth-gate').style.display='block';return}if(!r.ok)throw new Error(j.error||'Lien invalide');cfg=j.data||{};document.getElementById('channel').textContent='Chaîne : '+(cfg.streamer||slug)+' · '+(cfg.maxFileMb||15)+' Mo · vidéo '+(cfg.maxVideoDuration||20)+' s maximum';document.getElementById('connected-user').textContent='✓ Connecté et vérifié : @'+(cfg.username||'viewer');document.getElementById('text').maxLength=cfg.maxText||100;document.getElementById('tts-row').hidden=!cfg.viewerTts;const voices=Array.isArray(cfg.voices)?cfg.voices:[];document.getElementById('voice').innerHTML=voices.map(v=>'<option value="'+String(v.id).replace(/"/g,'')+'">'+String(v.name).replace(/[<>]/g,'')+'</option>').join('');document.getElementById('voice-row').hidden=!cfg.viewerTts;document.getElementById('form').style.display='block'}catch(e){document.getElementById('channel').textContent='Lien indisponible';show(e.message,false)}}boot();
document.getElementById('text').oninput=e=>{const c=document.getElementById('caption');c.textContent=e.target.value;c.style.display=e.target.value?'block':'none'};
file.onchange=()=>{const f=file.files[0];videoDuration=0;if(objectUrl)URL.revokeObjectURL(objectUrl);imagePreview.style.display=videoPreview.style.display='none';if(!f)return;objectUrl=URL.createObjectURL(f);if(f.type.startsWith('video/')){videoPreview.src=objectUrl;videoPreview.style.display='block';videoPreview.onloadedmetadata=()=>{videoDuration=videoPreview.duration;if(!Number.isFinite(videoDuration)||videoDuration>(cfg.maxVideoDuration||20)+.25){file.value='';videoPreview.style.display='none';show('La vidéo doit durer '+(cfg.maxVideoDuration||20)+' secondes maximum.',false)}}}else{imagePreview.src=objectUrl;imagePreview.style.display='block'}};
send.onclick=()=>{const f=file.files[0];if(!f)return show('Choisis une image, un GIF ou une vidéo.',false);if(f.type.startsWith('video/')&&!videoDuration)return show('Attends la fin de l’analyse de la vidéo.',false);send.disabled=true;const rd=new FileReader;rd.onload=async()=>{try{const r=await fetch('/api/public/memes/'+encodeURIComponent(slug)+'/submit',{method:'POST',credentials:'same-origin',headers:{'Content-Type':'application/json'},body:JSON.stringify({token,text:document.getElementById('text').value,image:rd.result,videoDuration,readText:document.getElementById('read-text').checked,voiceId:document.getElementById('voice').value})}),j=await r.json();show(r.ok?(j.status==='approved'?'Mème envoyé sur le live ! Ce lien est maintenant utilisé.':'Mème envoyé pour validation. Ce lien est maintenant utilisé.'):(j.error||'Erreur'),r.ok);if(r.ok){send.disabled=true;file.disabled=true;document.getElementById('text').disabled=true}}catch(e){show('Envoi impossible.',false);send.disabled=false}};rd.readAsDataURL(f)};
</script></body></html>
