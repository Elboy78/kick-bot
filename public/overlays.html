<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mes Overlays</title><style>
*{box-sizing:border-box}body{margin:0;background:#080b12;color:#edf2ff;font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif}.wrap{max-width:1100px;margin:0 auto;padding:34px 22px}.top{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:24px}.nav{display:flex;gap:10px;flex-wrap:wrap}.nav a{border:1px solid #ffffff16;background:#121826;color:#edf2ff;text-decoration:none;border-radius:12px;padding:10px 14px;font-weight:700;font-size:13px}.nav a.active{background:#25d34f;color:#06100a;border-color:#25d34f}.h{font-size:32px;font-weight:900;letter-spacing:-.04em}.muted{color:#8893a8}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:24px}.card{background:#111724;border:1px solid #ffffff12;border-radius:20px;padding:18px}.title{font-size:18px;font-weight:900}.url{margin-top:12px;border:1px solid #ffffff10;background:#0b101b;border-radius:14px;padding:12px;font-family:ui-monospace,Consolas,monospace;color:#dbe6ff;filter:blur(3px);user-select:none;transition:.15s;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.card:hover .url{filter:blur(0)}.row{display:flex;gap:10px;margin-top:14px}.btn{border:1px solid #ffffff16;background:#182033;color:#edf2ff;text-decoration:none;border-radius:12px;padding:10px 14px;font-weight:800;font-size:13px;cursor:pointer}.btn.green{background:#25d34f;color:#06100a;border-color:#25d34f}@media(max-width:800px){.grid{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}}
</style></head><body><div class="wrap"><div class="top"><div><div class="h">Mes Overlays OBS</div><div class="muted" id="streamer">Liens sécurisés par streamer</div></div><div class="nav"><a id="dashLink">Dashboard</a><a class="active" id="overlaysLink">Overlays</a><a id="accountLink">Compte</a></div></div><div class="grid" id="grid"></div></div><script>
const pathSlug=(location.pathname.match(/^\/s\/([^\/]+)/)||[])[1]||''; const slug=(window.__STREAMER_SLUG__||pathSlug||new URLSearchParams(location.search).get('streamer')||'').toLowerCase(); const qs=slug?'?streamer='+encodeURIComponent(slug):''; const sp=p=>slug?`/s/${slug}${p}`:p; dashLink.href=sp('/dashboard'); overlaysLink.href=sp('/overlays'); accountLink.href=sp('/account');
function card(x){return `<div class="card"><div class="title">${x.name}</div><div class="muted">${x.desc||''}</div><div class="url" title="Survole pour voir">${x.url}</div><div class="row"><button class="btn green" onclick="copy('${encodeURIComponent(x.url)}',this)">Copier</button><a class="btn" target="_blank" href="${x.url}">Ouvrir</a></div></div>`}
async function copy(u,b){await navigator.clipboard.writeText(decodeURIComponent(u)); const t=b.textContent; b.textContent='Copié ✓'; setTimeout(()=>b.textContent=t,1200)}
async function load(){const r=await fetch('/api/v2/overlays'+qs,{cache:'no-store'}); const j=await r.json(); const d=j.data||{}; streamer.textContent='Streamer : '+(d.streamer||slug); grid.innerHTML=(d.items||[]).map(card).join('')||'<div class="muted">Aucun overlay.</div>'}
load();
</script></body></html>
