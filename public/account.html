<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mon compte</title><style>
*{box-sizing:border-box}body{margin:0;background:#080b12;color:#edf2ff;font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif}.wrap{max-width:900px;margin:0 auto;padding:34px 22px}.nav{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:24px}.nav a{border:1px solid #ffffff16;background:#121826;color:#edf2ff;text-decoration:none;border-radius:12px;padding:10px 14px;font-weight:700;font-size:13px}.nav a.active{background:#25d34f;color:#06100a}.card{background:#111724;border:1px solid #ffffff12;border-radius:24px;padding:24px}.head{display:flex;gap:18px;align-items:center}.avatar{width:76px;height:76px;border-radius:22px;background:#25d34f;display:grid;place-items:center;color:#06100a;font-size:28px;font-weight:900;object-fit:cover}.name{font-size:28px;font-weight:900}.muted{color:#8893a8}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:24px}.field{background:#0b101b;border:1px solid #ffffff10;border-radius:16px;padding:14px}.k{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#8893a8;font-weight:800}.v{margin-top:8px;font-weight:800}.btn{display:inline-block;margin-top:20px;border:1px solid #25d34f;background:#25d34f;color:#06100a;text-decoration:none;border-radius:12px;padding:11px 15px;font-weight:900}@media(max-width:700px){.grid{grid-template-columns:1fr}.head{align-items:flex-start;flex-direction:column}}
</style></head><body><div class="wrap"><div class="nav"><a id="dashLink">Dashboard</a><a id="overlaysLink">Overlays</a><a class="active" id="accountLink">Compte</a></div><div class="card"><div class="head"><img id="avatar" class="avatar"><div><div class="name" id="name">Compte streamer</div><div class="muted" id="slug">Chargement...</div></div></div><div class="grid"><div class="field"><div class="k">OAuth Kick</div><div class="v" id="oauth">—</div></div><div class="field"><div class="k">Rôle</div><div class="v" id="role">—</div></div><div class="field"><div class="k">Kick username</div><div class="v" id="kick">—</div></div><div class="field"><div class="k">Streamer ID</div><div class="v" id="sid">—</div></div></div><a class="btn" id="connect">Connecter / reconnecter Kick</a></div></div><script>
const pathSlug=(location.pathname.match(/^\/s\/([^\/]+)/)||[])[1]||''; const slugVal=(window.__STREAMER_SLUG__||pathSlug||new URLSearchParams(location.search).get('streamer')||'').toLowerCase(); const qs=slugVal?'?streamer='+encodeURIComponent(slugVal):''; const sp=p=>slugVal?`/s/${slugVal}${p}`:p; dashLink.href=sp('/dashboard'); overlaysLink.href=sp('/overlays'); accountLink.href=sp('/account'); connect.href='/auth/login'+qs;
async function load(){const r=await fetch('/api/v2/account'+qs,{cache:'no-store'}); const j=await r.json(); const d=j.data||{}; name.textContent=d.displayName||d.slug||'Streamer'; slug.textContent='@'+(d.slug||slugVal); oauth.textContent=d.oauthConnected?'Connecté':'Non connecté'; role.textContent=d.role||'streamer'; kick.textContent=d.kickUsername||d.slug||'—'; sid.textContent=d.streamerId||d.id||'—'; if(d.avatarUrl){avatar.src=d.avatarUrl}else{avatar.removeAttribute('src'); avatar.alt=(d.displayName||d.slug||'B')[0]}}
load();
</script></body></html>
