<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Bot7uP — Overlay TTS</title>
<style>
  /* Fond transparent pour OBS */
  html, body { margin:0; padding:0; background:transparent; overflow:hidden; font-family:'Segoe UI',system-ui,sans-serif; }

  #alert {
    position:fixed; bottom:40px; left:50%; transform:translateX(-50%) translateY(150%);
    background:rgba(10,14,30,.92); border:1px solid rgba(139,53,255,.6);
    border-radius:16px; padding:18px 26px; min-width:320px; max-width:600px;
    box-shadow:0 8px 40px rgba(139,53,255,.35);
    transition:transform .45s cubic-bezier(.34,1.56,.64,1);
    color:#fff;
  }
  #alert.show { transform:translateX(-50%) translateY(0); }

  .donor { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
  .donor .icon { font-size:26px; }
  .donor .name { font-size:19px; font-weight:800; color:#8b35ff; }
  .donor .amount { font-size:17px; font-weight:700; color:#28ff66; margin-left:auto; }
  .msg { font-size:15px; line-height:1.5; color:#e8e8f0; word-wrap:break-word; }
</style>
</head>
<body>

<div id="alert">
  <div class="donor">
    <span class="icon">💸</span>
    <span class="name" id="donor-name">—</span>
    <span class="amount" id="donor-amount"></span>
  </div>
  <div class="msg" id="donor-msg"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const alertEl = document.getElementById('alert');
const nameEl  = document.getElementById('donor-name');
const amtEl   = document.getElementById('donor-amount');
const msgEl   = document.getElementById('donor-msg');

// File d'attente : si plusieurs dons arrivent en rafale, ils se jouent l'un après l'autre
const queue = [];
let playing = false;

socket.on('connect', () => console.log('[OVERLAY] Connecté au serveur ✓'));

socket.on('play-tts', (data) => {
  queue.push(data);
  if (!playing) playNext();
});

function playNext() {
  if (!queue.length) { playing = false; return; }
  playing = true;
  const { username, message, amount, audio, volume } = queue.shift();

  // Affichage visuel
  nameEl.textContent = username || 'Anonyme';
  amtEl.textContent  = amount > 0 ? amount.toFixed(2) + ' €' : '';
  msgEl.textContent  = message || '';
  alertEl.classList.add('show');

  const hide = () => {
    alertEl.classList.remove('show');
    setTimeout(playNext, 700); // petit délai entre deux alertes
  };

  if (audio) {
    const player = new Audio('data:audio/mpeg;base64,' + audio);
    player.volume = Math.min(1, Math.max(0, parseFloat(volume) || 1));
    player.onended = () => setTimeout(hide, 1200); // l'alerte reste 1.2s après la fin de l'audio
    player.onerror = () => setTimeout(hide, 5000);
    player.play().catch(() => setTimeout(hide, 5000)); // autoplay bloqué → alerte visuelle seule 5s
  } else {
    // Pas d'audio généré → alerte visuelle seule pendant 6 secondes
    setTimeout(hide, 6000);
  }
}
</script>
</body>
</html>
