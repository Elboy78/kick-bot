.podium .pod.first .avatar{position:relative;z-index:3;animation:championFloat 2.8s ease-in-out infinite}.podium .pod.first:before{z-index:1;width:136px;height:136px;top:17px;background:conic-gradient(from 0deg,transparent 0 12%,#fff5a7 17%,transparent 23% 43%,#ffc400 49%,transparent 56% 76%,#fff9cf 82%,transparent 89%);filter:blur(.5px) drop-shadow(0 0 10px #ffc400);animation:championOrbit 4.5s linear infinite}.podium .pod.first:after{content:"✦";position:absolute;z-index:4;left:50%;top:17px;color:#fff8bc;font-size:15px;text-shadow:-52px 30px 0 #ffd43b,48px 52px 0 #fff2a0,-38px 91px 0 #ffbd00,42px 103px 0 #ffe56b,0 0 12px #fff;animation:championSparkles 2.2s ease-in-out infinite;pointer-events:none}.podium .pod.first .medal{display:inline-block;animation:championMedal 2.8s ease-in-out infinite}@keyframes championFloat{0%,100%{transform:translateY(0) scale(1);box-shadow:0 0 0 4px #d99f00,0 0 18px #fff2a6,0 0 36px #ffc400,0 12px 28px #000c}50%{transform:translateY(-5px) scale(1.045);box-shadow:0 0 0 5px #fff0a1,0 0 30px #fffbd9,0 0 58px #ffd000,0 16px 32px #000d}}@keyframes championOrbit{0%{transform:translateX(-50%) rotate(0deg) scale(.94);opacity:.7}50%{transform:translateX(-50%) rotate(180deg) scale(1.08);opacity:1}100%{transform:translateX(-50%) rotate(360deg) scale(.94);opacity:.7}}@keyframes championSparkles{0%,100%{transform:translateX(-50%) scale(.75) rotate(-8deg);opacity:.35}45%{transform:translateX(-50%) scale(1.2) rotate(8deg);opacity:1}70%{opacity:.65}}@keyframes championMedal{0%,100%{transform:translateY(0) rotate(-3deg);filter:drop-shadow(0 0 9px #ffd900)}50%{transform:translateY(-3px) rotate(3deg) scale(1.12);filter:drop-shadow(0 0 18px #fff170)}}@media(prefers-reduced-motion:reduce){.podium .pod.first .avatar,.podium .pod.first:before,.podium .pod.first:after,.podium .pod.first .medal{animation:none}}
.pod.third .pname{font-size:15px}.pod.second .pname{font-size:18px}.pod.first .pname{font-size:23px}.pod.third .count{font-size:15px}.pod.second .count{font-size:18px}.pod.first .count{font-size:23px}.pod.third .medal{font-size:36px;filter:drop-shadow(0 3px 5px #8f4d2399)}.pod.second .medal{font-size:40px;filter:drop-shadow(0 3px 6px #e8f2ff99)}.pod.first .medal{font-size:48px;filter:drop-shadow(0 0 10px #ffd900)}.row .name,.row .gifts{font-size:13px}.pod.second .avatar{border-color:#e9f1f7;box-shadow:0 0 0 3px #94a5b5,0 0 18px #dceaffaa,0 8px 20px #000b}.pod.third .avatar{border-color:#cd7f32;box-shadow:0 0 0 3px #754019,0 0 16px #d88a4599,0 8px 20px #000b}.pod.first .avatar{border-color:#ffe566;box-shadow:0 0 0 4px #d99f00,0 0 16px #fff2a6,0 0 34px #ffc400,0 10px 28px #000c;animation:goldChampion 1.8s ease-in-out infinite}.pod.first:before{content:"";position:absolute;width:122px;height:122px;left:50%;top:25px;transform:translateX(-50%);border-radius:50%;background:radial-gradient(circle,transparent 48%,#fff7b8aa 53%,#ffd00066 61%,transparent 72%);animation:goldHalo 2.4s linear infinite;pointer-events:none}@keyframes goldChampion{0%,100%{box-shadow:0 0 0 4px #d99f00,0 0 16px #fff2a6,0 0 34px #ffc400,0 10px 28px #000c}50%{box-shadow:0 0 0 5px #fff0a1,0 0 25px #fff8cf,0 0 48px #ffd000,0 12px 30px #000d}}@keyframes goldHalo{0%{transform:translateX(-50%) rotate(0deg) scale(.96);opacity:.65}50%{opacity:1}100%{transform:translateX(-50%) rotate(360deg) scale(1.08);opacity:.65}}@media(prefers-reduced-motion:reduce){.pod.first .avatar,.pod.first:before{animation:none}}
:root{--green:#53b52f;--lime:#78dc43;--navy:#0b1d30;--card:#182d42;--muted:#86a4bb;--gold:#ffd135}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 50% -15%,#1b6042 0,transparent 38%),linear-gradient(180deg,#071522,#030a11);font-family:Inter,Arial,sans-serif;color:#fff}.app{width:min(100%,430px);min-height:100vh;margin:auto;background:#0a1b2c;box-shadow:0 0 55px #0009;overflow:hidden}.head{height:82px;display:flex;align-items:center;gap:13px;padding:13px 18px;background:linear-gradient(135deg,#63c636,#3d9f27);border-bottom:4px solid #9be65e}.head img{width:52px;height:52px;object-fit:contain;filter:drop-shadow(0 5px 8px #174d26aa)}.head strong{display:block;font-size:23px}.head small{display:block;font-weight:800;letter-spacing:.08em}.podium{position:relative;min-height:245px;padding:28px 12px 12px;display:grid;grid-template-columns:1fr 1.12fr 1fr;align-items:end;gap:5px;background:linear-gradient(#6fc34255,#173b2cdd),radial-gradient(circle at center,#9ce77099,transparent 56%)}.podium:before{content:"";position:absolute;inset:0;opacity:.25;background:repeating-linear-gradient(135deg,transparent 0 35px,#fff 36px,transparent 38px)}.pod{position:relative;text-align:center;z-index:1}.pod.first{align-self:start}.avatar{width:76px;height:76px;margin:auto;border-radius:50%;display:grid;place-items:center;overflow:hidden;background:#10253a;border:5px solid var(--lime);box-shadow:0 5px 16px #0008;color:#fff;font-size:25px;font-weight:950}.first .avatar{width:100px;height:100px;border-color:var(--gold);box-shadow:0 0 0 4px #ffc40055,0 8px 22px #0009}.avatar img{width:100%;height:100%;object-fit:cover}.pname{font-size:11px;font-weight:950;margin:7px 0 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.medal{font-size:24px;line-height:1}.count{display:inline-block;min-width:72px;padding:4px 8px;border-radius:4px;background:#0b2118dd;font-weight:950;font-size:12px}.table-head,.row{display:grid;grid-template-columns:46px 48px 1fr 82px;align-items:center;gap:8px}.table-head{padding:11px 13px;color:#71a0c2;font-size:9px;font-weight:950;text-transform:uppercase}.list{padding:0 9px 8px}.row{min-height:58px;margin-bottom:7px;padding:6px 10px;border-radius:11px;background:linear-gradient(90deg,#1b354d,#172c40);border-left:4px solid #56bc31}.rank{font-weight:950}.mini{width:42px;height:42px;border:3px solid #5bc934;border-radius:50%;display:grid;place-items:center;overflow:hidden;background:#0d2032;font-weight:950}.mini img{width:100%;height:100%;object-fit:cover}.name{font-weight:850;overflow:hidden;text-overflow:ellipsis}.gifts{text-align:right;font-weight:950;color:#a7f66f}.more{display:none;width:calc(100% - 18px);margin:2px 9px 16px;padding:13px;border:1px solid #62ca3b;border-radius:10px;background:#173a2b;color:#aaf57f;font-weight:950;cursor:pointer}.more:hover{background:#20513a}.empty,.foot{text-align:center;color:var(--muted);padding:25px}.foot{padding:12px;font-size:10px;border-top:1px solid #ffffff12}.live{display:inline-block;width:7px;height:7px;border-radius:50%;background:#65e339;box-shadow:0 0 9px #65e339;margin-right:5px}@media(min-width:700px){body{padding:25px}.app{min-height:calc(100vh - 50px);border-radius:20px}}
</style></head><body><main class="app"><header class="head"><img src="/assets/brand/elbot-logo.png?v=2"><div><strong>LeaderBoard</strong><small>SUBS · TOP GIFTS</small></div></header><section class="podium" id="podium"></section><div class="table-head"><span>Rang</span><span></span><span>Nom</span><span>Subs</span></div><section class="list" id="list"><div class="empty">Chargement…</div></section><button class="more" id="more" onclick="showMore()">Voir plus</button><footer class="foot"><span class="live"></span>Actualisation automatique · ElBot</footer></main>
<script>
const slug=decodeURIComponent((location.pathname.match(/^\/subgifts\/([^/?#]+)/)||[])[1]||'').toLowerCase(),fmt=n=>new Intl.NumberFormat('fr-FR',{maximumFractionDigits:0}).format(Number(n||0)),esc=s=>String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])),initial=s=>String(s||'?').slice(0,2).toUpperCase();
const avatarCache=new Map();async function avatar(user){if(avatarCache.has(user))return avatarCache.get(user);try{const r=await fetch(`https://kick.com/api/v2/channels/${encodeURIComponent(slug)}/users/${encodeURIComponent(user)}`,{headers:{Accept:'application/json'},cache:'force-cache'}),j=await r.json(),url=j?.profile_picture||j?.user?.profile_picture||j?.profile_pic||'';avatarCache.set(user,url);return url}catch(_){return''}}
function face(item,cls='avatar'){const url=avatarCache.get(String(item.username).toLowerCase())||'';return `<span class="${cls}">${url?`<img src="${esc(url)}" alt="">`:initial(item.username)}</span>`}
let allRows=[],visibleCount=100;
async function render(){const visible=allRows.slice(0,visibleCount);await Promise.all(visible.slice(0,Math.min(visible.length,200)).map(x=>avatar(String(x.username).toLowerCase())));const top=[allRows[1],allRows[0],allRows[2]],medals=['🥈','🥇','🥉'],classes=['second','first','third'];document.getElementById('podium').innerHTML=top.map((x,i)=>x?`<article class="pod ${classes[i]}"><div class="pname">${esc(x.username)}</div>${face(x)}<div class="medal">${medals[i]}</div><div class="count">${fmt(x.gifts)}</div></article>`:'<article></article>').join('');document.getElementById('list').innerHTML=visible.slice(3).map(x=>`<div class="row"><span class="rank">${x.rank}</span>${face(x,'mini')}<span class="name">${esc(x.username)}</span><span class="gifts">${fmt(x.gifts)}</span></div>`).join('')||'<div class="empty">Aucun autre sub gifter.</div>';const more=document.getElementById('more'),remaining=Math.max(0,allRows.length-visibleCount);more.style.display=remaining?'block':'none';more.textContent=remaining?`Voir plus · ${remaining} restant${remaining>1?'s':''}`:'Voir plus'}
async function showMore(){visibleCount=Math.min(allRows.length,visibleCount+100);await render()}
async function load(){try{const r=await fetch(`/api/public/subgifts/${encodeURIComponent(slug)}?limit=5000&ts=${Date.now()}`,{cache:'no-store'}),j=await r.json();allRows=Array.isArray(j.data)?j.data:[];await render();document.title=`Top Sub Gifts · ${slug} · ElBot`}catch(_){document.getElementById('list').innerHTML='<div class="empty">Classement momentanément indisponible.</div>'}}load();setInterval(load,30000);
</script></body></html>
