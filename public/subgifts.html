<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Top Sub Gifts · ElBot</title>
<style>
:root{--green:#53b52f;--lime:#78dc43;--navy:#0b1d30;--card:#182d42;--muted:#86a4bb;--gold:#ffd135}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 50% -15%,#1b6042 0,transparent 38%),linear-gradient(180deg,#071522,#030a11);font-family:Inter,Arial,sans-serif;color:#fff}.app{width:min(100%,430px);min-height:100vh;margin:auto;background:#0a1b2c;box-shadow:0 0 55px #0009;overflow:hidden}.head{height:82px;display:flex;align-items:center;gap:13px;padding:13px 18px;background:linear-gradient(135deg,#63c636,#3d9f27);border-bottom:4px solid #9be65e}.head img{width:52px;height:52px;object-fit:contain;filter:drop-shadow(0 5px 8px #174d26aa)}.head strong{display:block;font-size:23px}.head small{display:block;font-weight:800;letter-spacing:.08em}.podium{position:relative;min-height:245px;padding:28px 12px 12px;display:grid;grid-template-columns:1fr 1.12fr 1fr;align-items:end;gap:5px;background:linear-gradient(#6fc34255,#173b2cdd),radial-gradient(circle at center,#9ce77099,transparent 56%)}.podium:before{content:"";position:absolute;inset:0;opacity:.25;background:repeating-linear-gradient(135deg,transparent 0 35px,#fff 36px,transparent 38px)}.pod{position:relative;text-align:center;z-index:1}.pod.first{align-self:start}.avatar{width:76px;height:76px;margin:auto;border-radius:50%;display:grid;place-items:center;overflow:hidden;background:#10253a;border:5px solid var(--lime);box-shadow:0 5px 16px #0008;color:#fff;font-size:25px;font-weight:950}.first .avatar{width:100px;height:100px;border-color:var(--gold);box-shadow:0 0 0 4px #ffc40055,0 8px 22px #0009}.avatar img{width:100%;height:100%;object-fit:cover}.pname{font-size:11px;font-weight:950;margin:7px 0 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.medal{font-size:24px;line-height:1}.count{display:inline-block;min-width:72px;padding:4px 8px;border-radius:4px;background:#0b2118dd;font-weight:950;font-size:12px}.table-head,.row{display:grid;grid-template-columns:46px 48px 1fr 82px;align-items:center;gap:8px}.table-head{padding:11px 13px;color:#71a0c2;font-size:9px;font-weight:950;text-transform:uppercase}.list{padding:0 9px 16px}.row{min-height:58px;margin-bottom:7px;padding:6px 10px;border-radius:11px;background:linear-gradient(90deg,#1b354d,#172c40);border-left:4px solid #56bc31}.rank{font-weight:950}.mini{width:42px;height:42px;border:3px solid #5bc934;border-radius:50%;display:grid;place-items:center;overflow:hidden;background:#0d2032;font-weight:950}.mini img{width:100%;height:100%;object-fit:cover}.name{font-weight:850;overflow:hidden;text-overflow:ellipsis}.gifts{text-align:right;font-weight:950;color:#a7f66f}.empty,.foot{text-align:center;color:var(--muted);padding:25px}.foot{padding:12px;font-size:10px;border-top:1px solid #ffffff12}.live{display:inline-block;width:7px;height:7px;border-radius:50%;background:#65e339;box-shadow:0 0 9px #65e339;margin-right:5px}@media(min-width:700px){body{padding:25px}.app{min-height:calc(100vh - 50px);border-radius:20px}}
</style></head><body><main class="app"><header class="head"><img src="/assets/brand/elbot-logo.png?v=2"><div><strong>LeaderBoard</strong><small>SUBS · TOP GIFTS</small></div></header><section class="podium" id="podium"></section><div class="table-head"><span>Rang</span><span></span><span>Nom</span><span>Subs</span></div><section class="list" id="list"><div class="empty">Chargement…</div></section><footer class="foot"><span class="live"></span>Actualisation automatique · ElBot</footer></main>
<script>
const slug=decodeURIComponent((location.pathname.match(/^\/subgifts\/([^/?#]+)/)||[])[1]||'').toLowerCase(),fmt=n=>new Intl.NumberFormat('fr-FR',{maximumFractionDigits:0}).format(Number(n||0)),esc=s=>String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])),initial=s=>String(s||'?').slice(0,2).toUpperCase();
const avatarCache=new Map();async function avatar(user){if(avatarCache.has(user))return avatarCache.get(user);try{const r=await fetch(`https://kick.com/api/v2/channels/${encodeURIComponent(slug)}/users/${encodeURIComponent(user)}`,{headers:{Accept:'application/json'},cache:'force-cache'}),j=await r.json(),url=j?.profile_picture||j?.user?.profile_picture||j?.profile_pic||'';avatarCache.set(user,url);return url}catch(_){return''}}
function face(item,cls='avatar'){const url=avatarCache.get(String(item.username).toLowerCase())||'';return `<span class="${cls}">${url?`<img src="${esc(url)}" alt="">`:initial(item.username)}</span>`}
async function load(){try{const r=await fetch(`/api/public/subgifts/${encodeURIComponent(slug)}?limit=100&ts=${Date.now()}`,{cache:'no-store'}),j=await r.json(),rows=Array.isArray(j.data)?j.data:[];await Promise.all(rows.slice(0,25).map(x=>avatar(String(x.username).toLowerCase())));const top=[rows[1],rows[0],rows[2]],medals=['🥈','🥇','🥉'],classes=['second','first','third'];document.getElementById('podium').innerHTML=top.map((x,i)=>x?`<article class="pod ${classes[i]}"><div class="pname">${esc(x.username)}</div>${face(x)}<div class="medal">${medals[i]}</div><div class="count">${fmt(x.gifts)}</div></article>`:'<article></article>').join('');document.getElementById('list').innerHTML=rows.slice(3).map(x=>`<div class="row"><span class="rank">${x.rank}</span>${face(x,'mini')}<span class="name">${esc(x.username)}</span><span class="gifts">${fmt(x.gifts)}</span></div>`).join('')||'<div class="empty">Aucun autre sub gifter.</div>';document.title=`Top Sub Gifts · ${slug} · ElBot`}catch(_){document.getElementById('list').innerHTML='<div class="empty">Classement momentanément indisponible.</div>'}}load();setInterval(load,30000);
</script></body></html>
