<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ElBot Memes</title>
<style>html,body{margin:0;width:100%;height:100%;overflow:hidden;background:transparent;font-family:Arial,sans-serif}#stage{position:fixed;inset:0;padding:24px;box-sizing:border-box;display:flex;align-items:center;justify-content:center;pointer-events:none}.meme{max-width:82vw;max-height:82vh;text-align:center;opacity:1;visibility:visible;filter:drop-shadow(0 12px 28px #000)}img{display:block;max-width:82vw;max-height:68vh;margin:auto;border-radius:18px}.text{display:inline-block;margin-top:12px;padding:10px 18px;border-radius:12px;background:rgba(0,0,0,.85);color:#fff;font-size:42px;font-weight:bold;text-shadow:0 2px 4px #000}</style></head><body><div id="stage"></div><script>
const token=location.pathname.split('/')[2]||'', queue=[],seen=new Set(); let playing=false, activeAudio=null, timer=null,lastId=0,initialized=false,overlayConfig={};
function enqueue(e,source='db'){e={...e,mediaUrl:e.mediaUrl||e.media_url};if(!e.mediaUrl)return;const key=e.mediaUrl;if(seen.has(key))return;seen.add(key);if(seen.size>300)seen.delete(seen.values().next().value);queue.push(e);next()}
function stop(){clearTimeout(timer);activeAudio?.pause();activeAudio=null;window.speechSynthesis?.cancel();queue.length=0;document.getElementById('stage').innerHTML='';playing=false}
function launchTone(volume=55,type='pop'){try{const C=window.AudioContext||window.webkitAudioContext,ctx=new C(),master=ctx.createGain(),level=Math.max(0,Math.min(1,Number(volume)/100));master.gain.setValueAtTime(level*.72,ctx.currentTime);master.connect(ctx.destination);const patterns={pop:[[720,.00,.16],[1080,.08,.18]],chime:[[523,.00,.55],[659,.12,.55],[784,.24,.65]],bell:[[880,.00,.8],[1320,.02,.65]],digital:[[420,.00,.10],[780,.11,.10],[1180,.22,.16]]},notes=patterns[type]||patterns.pop;let end=0;for(const[f,delay,length]of notes){const osc=ctx.createOscillator(),gain=ctx.createGain(),start=ctx.currentTime+delay;osc.type=type==='digital'?'square':'sine';osc.frequency.setValueAtTime(f,start);gain.gain.setValueAtTime(type==='digital'?.16:.28,start);gain.gain.exponentialRampToValueAtTime(.0001,start+length);osc.connect(gain);gain.connect(master);osc.start(start);osc.stop(start+length);end=Math.max(end,delay+length)}setTimeout(()=>ctx.close(),(end+.1)*1000)}catch(_){}}
function media(url,type){const video=type==='video'||/\.(mp4|webm|mov)(\?|$)/i.test(url);const el=document.createElement(video?'video':'img');el.src=url;el.crossOrigin='anonymous';if(video){el.autoplay=true;el.muted=false;el.volume=.7;el.playsInline=true}return el}
function next(){if(playing||!queue.length)return;playing=true;const e=queue.shift(),box=document.createElement('div');box.className='meme';box.style.maxWidth=Math.max(20,Math.min(100,Number(e.size)||80))+'vw';if(e.launchSound!==false)launchTone(e.launchSoundVolume,e.launchSoundType);const visual=media(e.mediaUrl+(e.mediaUrl.includes('?')?'&':'?')+'event='+(e.id||Date.now()),e.mediaType);visual.style.maxWidth='100%';box.appendChild(visual);if(e.text){const t=document.createElement('div');t.className='text';t.textContent=e.text;box.appendChild(t)}if(e.ttsUrl){activeAudio=new Audio(e.ttsUrl);activeAudio.volume=1;activeAudio.play().catch(()=>{})}else if(e.speakText&&window.speechSynthesis){const utterance=new SpeechSynthesisUtterance(e.speakText);utterance.lang='fr-FR';utterance.volume=1;utterance.rate=1;window.speechSynthesis.cancel();window.speechSynthesis.speak(utterance)}const stage=document.getElementById('stage');stage.style.alignItems=String(e.position).startsWith('top')?'flex-start':String(e.position).startsWith('bottom')?'flex-end':'center';stage.style.justifyContent=String(e.position).endsWith('left')?'flex-start':String(e.position).endsWith('right')?'flex-end':'center';stage.replaceChildren(box);timer=setTimeout(()=>{activeAudio?.pause();activeAudio=null;window.speechSynthesis?.cancel();visual.pause?.();stage.replaceChildren();playing=false;next()},Math.max(2,Math.min(20,Number(e.duration)||6))*1000)}
async function poll(){try{const r=await fetch('/api/widgets/memes?overlayToken='+encodeURIComponent(token)+'&after='+lastId+'&ts='+Date.now(),{cache:'no-store'});if(!r.ok)throw new Error('HTTP '+r.status);const j=await r.json(),events=Array.isArray(j.events)?j.events:[];overlayConfig=j.data||overlayConfig;for(const e of events)lastId=Math.max(lastId,Number(e.id)||0);const playable=initialized?events:(events.length?[events[events.length-1]]:[]);for(const e of playable)enqueue({...e,launchSound:overlayConfig.launchSound,launchSoundType:overlayConfig.launchSoundType,launchSoundVolume:overlayConfig.launchSoundVolume},'db');initialized=true}catch(e){console.warn('[MEMES OVERLAY]',e.message)}}poll();setInterval(poll,500)
</script></body></html>
