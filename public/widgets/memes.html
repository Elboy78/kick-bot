<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ElBot Memes</title>
<style>html,body{margin:0;width:100%;height:100%;overflow:hidden;background:transparent;font-family:Inter,Arial,sans-serif}#stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}.meme{max-width:82vw;max-height:82vh;text-align:center;opacity:0;transform:scale(.72);transition:.28s cubic-bezier(.2,.9,.2,1);filter:drop-shadow(0 12px 28px #000)}.meme.on{opacity:1;transform:scale(1)}video,img{display:block;max-width:82vw;max-height:68vh;margin:auto;border-radius:18px}.text{display:inline-block;margin-top:12px;padding:10px 18px;border-radius:12px;background:rgba(0,0,0,.82);color:#fff;font-size:clamp(22px,3vw,52px);font-weight:900;text-shadow:0 2px 4px #000}.by{font-size:.45em;color:#4cff8b;margin-right:8px}</style></head><body><div id="stage"></div><script src="/socket.io/socket.io.js"></script><script>
const token=location.pathname.split('/')[2]||'', queue=[]; let playing=false, activeAudio=null, timer=null,lastId=0,initialized=false;
const socket=io({query:{streamer:document.cookie.match(/(?:^|; )kb_streamer=([^;]+)/)?.[1]||''}});
socket.on('meme-overlay-stop',stop); socket.on('overlay-token-regenerated',e=>{if(e.widget==='memes')location.reload()});
function stop(){clearTimeout(timer);activeAudio?.pause();activeAudio=null;queue.length=0;document.getElementById('stage').innerHTML='';playing=false}
function media(url){const video=/\.(mp4|webm|mov)(\?|$)/i.test(url);const el=document.createElement(video?'video':'img');el.src=url;el.crossOrigin='anonymous';if(video){el.autoplay=true;el.muted=true;el.playsInline=true}return el}
function next(){if(playing||!queue.length)return;playing=true;const e=queue.shift(),box=document.createElement('div');box.className='meme';box.style.maxWidth=Math.max(20,Math.min(100,Number(e.size)||80))+'vw';const visual=media(e.mediaUrl);visual.style.maxWidth='100%';box.appendChild(visual);if(e.text){const t=document.createElement('div');t.className='text';const by=document.createElement('span');by.className='by';by.textContent=e.username; t.append(by,document.createTextNode(e.text));box.appendChild(t)}const stage=document.getElementById('stage');stage.style.alignItems=e.position==='top'?'flex-start':e.position==='bottom'?'flex-end':'center';stage.innerHTML='';stage.appendChild(box);requestAnimationFrame(()=>box.classList.add('on'));timer=setTimeout(()=>{box.classList.remove('on');setTimeout(()=>{stage.innerHTML='';playing=false;next()},300)},Math.max(2,Number(e.duration)||6)*1000)}
async function poll(){try{const r=await fetch('/api/widgets/memes?overlayToken='+encodeURIComponent(token)+'&after='+lastId,{cache:'no-store'});if(!r.ok)throw 0;const j=await r.json(),events=Array.isArray(j.events)?j.events:[];for(const e of events)lastId=Math.max(lastId,Number(e.id)||0);const playable=initialized?events:events.filter(e=>{const d=String(e.createdAt||'').replace(' ','T');const at=Date.parse(d+(d.endsWith('Z')?'':'Z'));return at&&Date.now()-at<30000});for(const e of playable){queue.push(e);next()}initialized=true}catch(_){document.body.innerHTML=''}}poll();setInterval(poll,700)
</script></body></html>
