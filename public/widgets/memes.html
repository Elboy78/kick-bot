<!doctype html><html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ElBot Memes</title>
<style>html,body{margin:0;width:100%;height:100%;overflow:hidden;background:transparent;font-family:Inter,Arial,sans-serif}#stage{position:fixed;inset:0;padding:24px;box-sizing:border-box;display:flex;align-items:center;justify-content:center;pointer-events:none}.meme{max-width:82vw;max-height:82vh;text-align:center;opacity:1!important;visibility:visible!important;transform:none!important;filter:drop-shadow(0 12px 28px #000)}video,img{display:block;max-width:82vw;max-height:68vh;margin:auto;border-radius:18px;opacity:1!important;visibility:visible!important}.text{display:inline-block;margin-top:12px;padding:10px 18px;border-radius:12px;background:rgba(0,0,0,.82);color:#fff;font-size:clamp(22px,3vw,52px);font-weight:900;text-shadow:0 2px 4px #000}</style></head><body><div id="stage"></div><script src="/socket.io/socket.io.js"></script><script>
const token=location.pathname.split('/')[2]||'', queue=[],seen=new Set(); let playing=false, activeAudio=null, timer=null,lastId=0,initialized=false;
const socket=io({query:{streamer:document.cookie.match(/(?:^|; )kb_streamer=([^;]+)/)?.[1]||''}});
function enqueue(e,source='db'){e={...e,mediaUrl:e.mediaUrl||e.media_url};if(!e.mediaUrl)return;const key=e.mediaUrl;if(seen.has(key))return;seen.add(key);if(seen.size>300)seen.delete(seen.values().next().value);queue.push(e);next()}
socket.on('meme-overlay-event',e=>enqueue(e,'socket'));socket.on('meme-overlay-stop',stop); socket.on('overlay-token-regenerated',e=>{if(e.widget==='memes')location.reload()});
function stop(){clearTimeout(timer);activeAudio?.pause();activeAudio=null;queue.length=0;document.getElementById('stage').innerHTML='';playing=false}
function media(url){const video=/\.(mp4|webm|mov)(\?|$)/i.test(url);const el=document.createElement(video?'video':'img');el.src=url;el.crossOrigin='anonymous';if(video){el.autoplay=true;el.muted=true;el.playsInline=true}return el}
function next(){if(playing||!queue.length)return;playing=true;const e=queue.shift(),box=document.createElement('div');box.className='meme';box.style.maxWidth=Math.max(20,Math.min(100,Number(e.size)||80))+'vw';const visual=media(e.mediaUrl+(e.mediaUrl.includes('?')?'&':'?')+'event='+(e.id||Date.now()));visual.style.maxWidth='100%';box.appendChild(visual);if(e.text){const t=document.createElement('div');t.className='text';t.textContent=e.text;box.appendChild(t)}const stage=document.getElementById('stage');stage.style.alignItems=String(e.position).startsWith('top')?'flex-start':String(e.position).startsWith('bottom')?'flex-end':'center';stage.style.justifyContent=String(e.position).endsWith('left')?'flex-start':String(e.position).endsWith('right')?'flex-end':'center';stage.replaceChildren(box);timer=setTimeout(()=>{stage.replaceChildren();playing=false;next()},Math.max(2,Number(e.duration)||6)*1000)}
async function poll(){try{const r=await fetch('/api/widgets/memes?overlayToken='+encodeURIComponent(token)+'&after='+lastId,{cache:'no-store'});if(!r.ok)throw new Error('HTTP '+r.status);const j=await r.json(),events=Array.isArray(j.events)?j.events:[];for(const e of events)lastId=Math.max(lastId,Number(e.id)||0);const playable=initialized?events:(events.length?[events[events.length-1]]:[]);for(const e of playable)enqueue(e,'db');initialized=true}catch(e){console.warn('[MEMES OVERLAY] Nouvelle tentative:',e.message)}}poll();setInterval(poll,700)
</script></body></html>
