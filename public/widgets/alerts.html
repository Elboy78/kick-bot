<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Alertes OBS</title><script src="/socket.io/socket.io.js"></script>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:transparent;font-family:Inter,Arial,sans-serif}
#stage{position:fixed;inset:0;display:flex;pointer-events:none;padding:32px;box-sizing:border-box}.pos-top_left{align-items:flex-start;justify-content:flex-start}.pos-top_center{align-items:flex-start;justify-content:center}.pos-top_right{align-items:flex-start;justify-content:flex-end}.pos-center{align-items:center;justify-content:center}.pos-bottom_left{align-items:flex-end;justify-content:flex-start}.pos-bottom_center{align-items:flex-end;justify-content:center}.pos-bottom_right{align-items:flex-end;justify-content:flex-end}
.alert{position:relative;min-width:320px;max-width:760px;padding:28px 32px;border-radius:24px;border:1px solid color-mix(in srgb,var(--accent) 45%,rgba(255,255,255,.18));background:var(--bg);box-shadow:0 24px 90px rgba(0,0,0,.55),0 0 58px color-mix(in srgb,var(--accent) 22%,transparent);color:white;text-align:center;backdrop-filter:blur(12px);opacity:0;will-change:transform,opacity,filter;overflow:hidden}.alert:before{content:"";position:absolute;left:0;right:0;top:0;height:3px;background:linear-gradient(90deg,transparent,var(--accent),transparent)}
.content{position:relative;z-index:2}.alert.layout-image_left,.alert.layout-image_right{display:flex;align-items:center;gap:24px;text-align:left}.alert.layout-image_right{flex-direction:row-reverse;text-align:right}.alert.layout-text_only .media{display:none}.alert.layout-fullscreen{width:min(900px,90vw);min-height:420px;display:flex;align-items:center;justify-content:center}.media{display:block;max-width:240px;max-height:180px;object-fit:contain;margin:0 auto 18px;border-radius:18px;filter:drop-shadow(0 16px 32px rgba(0,0,0,.45))}.layout-image_left .media,.layout-image_right .media{margin:0;max-width:190px;max-height:150px}.layout-fullscreen .media{position:absolute;inset:0;width:100%;height:100%;max-width:none;max-height:none;object-fit:cover;margin:0;opacity:.5}.type{font-size:12px;text-transform:uppercase;letter-spacing:2px;color:var(--accent);font-weight:950;margin-bottom:9px}.title{font-size:var(--title-size);line-height:1.04;font-weight:950;text-shadow:0 4px 18px rgba(0,0,0,.72);letter-spacing:-.8px}.message{font-size:var(--message-size);line-height:1.2;font-weight:850;margin-top:10px;text-shadow:0 4px 18px rgba(0,0,0,.75)}
.enter-fade{animation:fadeIn .35s ease forwards}.exit-fade{animation:fadeOut .3s ease forwards}.enter-pop{animation:popIn .42s cubic-bezier(.2,1.25,.35,1) forwards}.exit-pop{animation:popOut .28s ease forwards}.enter-zoom{animation:zoomIn .38s ease forwards}.exit-zoom{animation:zoomOut .28s ease forwards}.enter-bounce{animation:bounceIn .62s cubic-bezier(.2,.9,.2,1.2) forwards}.exit-bounce{animation:fadeOut .28s ease forwards}.enter-shake{animation:shakeIn .55s ease forwards}.exit-shake{animation:fadeOut .28s ease forwards}.enter-flip{animation:flipIn .52s ease forwards}.exit-flip{animation:flipOut .34s ease forwards}.enter-glitch{animation:glitchIn .52s steps(2,end) forwards}.exit-glitch{animation:glitchOut .3s steps(2,end) forwards}.enter-slide_left{animation:slideLeftIn .38s ease forwards}.exit-slide_left{animation:slideLeftOut .3s ease forwards}.enter-slide_right{animation:slideRightIn .38s ease forwards}.exit-slide_right{animation:slideRightOut .3s ease forwards}.enter-slide_up{animation:slideUpIn .38s ease forwards}.exit-slide_up{animation:slideUpOut .3s ease forwards}.enter-slide_down{animation:slideDownIn .38s ease forwards}.exit-slide_down{animation:slideDownOut .3s ease forwards}
@keyframes fadeIn{to{opacity:1}}@keyframes fadeOut{from{opacity:1}to{opacity:0}}@keyframes popIn{0%{opacity:0;transform:scale(.7)}70%{opacity:1;transform:scale(1.05)}100%{opacity:1;transform:scale(1)}}@keyframes popOut{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(.82)}}@keyframes zoomIn{from{opacity:0;transform:scale(1.28);filter:blur(8px)}to{opacity:1;transform:scale(1);filter:blur(0)}}@keyframes zoomOut{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(.86)}}@keyframes bounceIn{0%{opacity:0;transform:translateY(80px) scale(.85)}55%{opacity:1;transform:translateY(-12px) scale(1.04)}75%{transform:translateY(5px) scale(.99)}100%{opacity:1;transform:none}}@keyframes shakeIn{0%{opacity:0;transform:scale(.9)}20%{opacity:1;transform:translateX(-18px)}35%{transform:translateX(16px)}50%{transform:translateX(-10px)}65%{transform:translateX(8px)}100%{opacity:1;transform:none}}@keyframes flipIn{from{opacity:0;transform:perspective(800px) rotateX(-80deg)}to{opacity:1;transform:perspective(800px) rotateX(0)}}@keyframes flipOut{from{opacity:1;transform:perspective(800px) rotateX(0)}to{opacity:0;transform:perspective(800px) rotateX(80deg)}}@keyframes glitchIn{0%{opacity:0;transform:translate(-18px,8px);filter:hue-rotate(90deg)}35%{opacity:1;transform:translate(12px,-5px)}60%{transform:translate(-6px,2px);filter:hue-rotate(-80deg)}100%{opacity:1;transform:none;filter:none}}@keyframes glitchOut{from{opacity:1}50%{transform:translate(12px,-4px);filter:hue-rotate(90deg)}to{opacity:0;transform:translate(-18px,6px)}}@keyframes slideLeftIn{from{opacity:0;transform:translateX(-110px)}to{opacity:1;transform:none}}@keyframes slideLeftOut{from{opacity:1}to{opacity:0;transform:translateX(-110px)}}@keyframes slideRightIn{from{opacity:0;transform:translateX(110px)}to{opacity:1;transform:none}}@keyframes slideRightOut{from{opacity:1}to{opacity:0;transform:translateX(110px)}}@keyframes slideUpIn{from{opacity:0;transform:translateY(100px)}to{opacity:1;transform:none}}@keyframes slideUpOut{from{opacity:1}to{opacity:0;transform:translateY(-100px)}}@keyframes slideDownIn{from{opacity:0;transform:translateY(-100px)}to{opacity:1;transform:none}}@keyframes slideDownOut{from{opacity:1}to{opacity:0;transform:translateY(100px)}}
#invalid{display:none;position:fixed;inset:0;align-items:center;justify-content:center;color:white;font:800 20px Inter;background:rgba(10,10,15,.88)}
</style></head>
<body><div id="stage" class="pos-center"></div><div id="invalid">Lien OBS expiré ou régénéré</div>
<script>
const pathParts=location.pathname.split('/').filter(Boolean);const token=pathParts[0]==='o'?pathParts[1]:new URLSearchParams(location.search).get('overlayToken')||'';const slugFromPath=(location.pathname.match(/^\/s\/([^/]+)/)||[])[1]||'';
const api=u=>u+(u.includes('?')?'&':'?')+(token?'overlayToken='+encodeURIComponent(token):slugFromPath?'streamer='+encodeURIComponent(slugFromPath):'');
const stage=document.getElementById('stage'), invalid=document.getElementById('invalid');let socket=null,queue=[],playing=false,currentConfigs={},streamer='';
function esc(v){return String(v||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
async function boot(){const r=await fetch(api('/api/widgets/alerts'),{cache:'no-store'});if(!r.ok){invalid.style.display='flex';return;}const d=await r.json();if(d.invalidOverlay){invalid.style.display='flex';return;}streamer=d.streamer||slugFromPath;currentConfigs=d.configs||{};socket=io({transports:['websocket','polling'],query:streamer?{streamer}: {}});socket.on('alert-overlay-event',a=>{if(a.streamer&&streamer&&a.streamer!==streamer)return;queue.push(a);next();});socket.on('alert-overlay-settings',d=>{if(d.configs)currentConfigs=d.configs;});setInterval(validateToken,30000);}
async function validateToken(){if(!token)return;try{const r=await fetch(api('/api/widgets/alerts'),{cache:'no-store'});if(r.status===410||r.status===404){stopAll();invalid.style.display='flex';}}catch{}}
function stopAll(){queue=[];playing=false;stage.innerHTML='';document.querySelectorAll('audio,video').forEach(m=>{try{m.pause()}catch{}});if(socket)socket.disconnect();}
function next(){if(playing||!queue.length)return;play(queue.shift());}
function mediaHtml(cfg){if(!cfg.media)return'';if(cfg.mediaType==='video')return `<video class="media" src="${esc(cfg.media)}" autoplay muted loop playsinline></video>`;return `<img class="media" src="${esc(cfg.media)}">`;}
function play(a){playing=true;const cfg=a.cfg||currentConfigs[a.type]||{};const dur=Math.max(1,Math.min(60,Number(cfg.duration||6)))*1000;const enter=cfg.enterAnimation||cfg.animation||'fade',exit=cfg.exitAnimation||'fade',layout=cfg.layout||'image_top',pos=cfg.position||'center';stage.className='pos-'+pos;const el=document.createElement('div');el.className=`alert layout-${layout} enter-${enter}`;el.style.setProperty('--accent',cfg.accent||'#22c55e');el.style.setProperty('--bg',cfg.background||'rgba(7,10,18,.86)');el.style.setProperty('--title-size',(cfg.titleSize||36)+'px');el.style.setProperty('--message-size',(cfg.messageSize||24)+'px');el.style.fontFamily=(cfg.font||'Inter')+',Arial,sans-serif';el.innerHTML=`${mediaHtml(cfg)}<div class="content">${cfg.showLabel===false?'':`<div class="type">${esc(a.label||a.type||'Alerte')}</div>`}<div class="title" style="color:${esc(cfg.textTop||'#fff')}">${esc(a.title||'')}</div><div class="message" style="color:${esc(cfg.textBottom||'#22c55e')}">${esc(a.message||'')}</div></div>`;stage.innerHTML='';stage.appendChild(el);let audio=null;if(cfg.sound){audio=new Audio(cfg.sound);audio.volume=Math.max(0,Math.min(1,Number(cfg.volume||35)/100));audio.play().catch(()=>{});}setTimeout(()=>{el.className=`alert layout-${layout} exit-${exit}`;if(audio){try{audio.pause();audio.currentTime=0}catch{}}setTimeout(()=>{stage.innerHTML='';playing=false;next();},450);},dur);}
boot().catch(()=>{invalid.style.display='flex'});
</script></body></html>
