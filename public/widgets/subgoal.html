<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>🎯 Sub Goal</title>
<style>
  html, body { margin:0; padding:0; background:transparent; overflow:hidden; font-family:'Segoe UI',system-ui,sans-serif; }

  #wrap {
    position:fixed; top:0; left:0; width:520px; padding:20px;
    display:flex; flex-direction:column; gap:8px;
  }

  #topLabel {
    display:flex; align-items:baseline; justify-content:space-between; gap:12px;
    color:#fff; text-shadow:0 2px 6px rgba(0,0,0,.85);
    font-weight:850; letter-spacing:.5px;
  }
  #topLabel .title { font-size:18px; text-transform:uppercase; }
  #topLabel .count { font-size:22px; white-space:nowrap; }
  .count b { color:#3dff7a; }
  .count span { color:#cfcfcf; font-weight:700; }

  #track {
    position:relative; width:100%; height:40px;
    background:rgba(10,10,14,.55); border:2px solid rgba(255,255,255,.18);
    border-radius:999px; overflow:hidden;
    box-shadow:inset 0 2px 6px rgba(0,0,0,.5), 0 6px 18px rgba(0,0,0,.35);
  }
  #fill {
    position:absolute; top:0; left:0; height:100%; width:0%;
    border-radius:999px;
    background:linear-gradient(90deg,#0f8a34,#2ee85f 55%,#7dffa6);
    box-shadow:0 0 18px rgba(46,232,95,.65), inset 0 2px 4px rgba(255,255,255,.35);
    transition:width .6s cubic-bezier(.22,.8,.3,1);
  }
  #fill::after {
    content:''; position:absolute; inset:0;
    background:repeating-linear-gradient(120deg, rgba(255,255,255,.12) 0 10px, transparent 10px 20px);
    opacity:.5;
  }
  #glow {
    position:absolute; top:0; left:0; height:100%; width:0%;
    border-radius:999px; pointer-events:none; opacity:0;
    box-shadow:0 0 30px 6px rgba(120,255,160,.9);
    transition:opacity .4s ease;
  }
  #glow.pop { opacity:1; }

  #inside {
    position:absolute; inset:0; z-index:2;
    display:flex; align-items:center; justify-content:center; gap:10px;
    padding:0 18px; box-sizing:border-box;
    font-size:14px; font-weight:950; color:#fff; text-shadow:0 1px 4px rgba(0,0,0,.85);
    white-space:nowrap;
  }
  #inside.left { justify-content:flex-start; }
  #inside.center { justify-content:center; }
  #inside.right { justify-content:flex-end; }
  #insideLabel { text-transform:uppercase; letter-spacing:.5px; overflow:hidden; text-overflow:ellipsis; }
  #insideCount { font-size:15px; }
</style>
</head>
<body>

<div id="wrap">
  <div id="topLabel">
    <span class="title" id="top-title">🎯 Sub Goal</span>
    <span class="count" id="top-count"><b id="top-cur">0</b><span> / <span id="top-tgt">50</span> subs</span></span>
  </div>
  <div id="track">
    <div id="fill"></div>
    <div id="glow"></div>
    <div id="inside" class="center">
      <span id="insideLabel">Sub Goal</span>
      <span id="insideCount">0 subs</span>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const fill = document.getElementById('fill');
const glow = document.getElementById('glow');
const topLabel = document.getElementById('topLabel');
const topTitle = document.getElementById('top-title');
const topCount = document.getElementById('top-count');
const topCur = document.getElementById('top-cur');
const topTgt = document.getElementById('top-tgt');
const inside = document.getElementById('inside');
const insideLabel = document.getElementById('insideLabel');
const insideCount = document.getElementById('insideCount');

let lastCurrent = null;

function clampChoice(value, allowed, fallback) {
  return allowed.includes(value) ? value : fallback;
}

function countText(current, target, mode) {
  const pct = target > 0 ? Math.min(100, Math.round((current / target) * 100)) : 0;
  if (mode === 'percent') return pct + '%';
  if (mode === 'progress') return current + ' / ' + target + ' subs';
  if (mode === 'hidden') return '';
  return current + ' subs';
}

function render(current, target, options = {}) {
  const label = options.label || 'Sub Goal';
  const textPosition = clampChoice(options.textPosition, ['above','inside','hidden'], 'inside');
  const countPosition = clampChoice(options.countPosition, ['above','inside','right','hidden'], 'inside');
  const progressDisplay = clampChoice(options.progressDisplay, ['count','progress','percent','hidden'], 'count');
  const textAlign = clampChoice(options.textAlign, ['left','center','right'], 'center');
  const pct = target > 0 ? Math.min(100, Math.round((current / target) * 100)) : 0;
  const txt = countText(current, target, progressDisplay);

  topTitle.textContent = '🎯 ' + label;
  topCur.textContent = current;
  topTgt.textContent = target;
  topTitle.style.display = textPosition === 'above' ? '' : 'none';
  topCount.style.display = countPosition === 'above' ? '' : 'none';
  topLabel.style.display = (textPosition === 'above' || countPosition === 'above') ? 'flex' : 'none';

  inside.className = textAlign;
  insideLabel.textContent = label;
  insideLabel.style.display = textPosition === 'inside' ? '' : 'none';
  insideCount.textContent = txt;
  insideCount.style.display = (countPosition === 'inside' || countPosition === 'right') && txt ? '' : 'none';
  if (countPosition === 'right') inside.style.justifyContent = 'space-between';

  fill.style.width = pct + '%';
  glow.style.width = pct + '%';

  if (lastCurrent !== null && current > lastCurrent) {
    glow.classList.add('pop');
    setTimeout(() => glow.classList.remove('pop'), 700);
  }
  lastCurrent = current;
}

async function loadInitial() {
  try {
    const r = await fetch('/api/widgets/subgoal');
    const d = await r.json();
    render(d.current || 0, d.target || 50, d);
  } catch(e) { console.error('[SUBGOAL] Erreur chargement initial', e); }
}

socket.on('subgoal-update', (d) => render(d.current || 0, d.target || 50, d));

loadInitial();
</script>
</body>
</html>
