<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sub Goal</title>
<style>
  :root{--fill:#26e07f;--track:rgba(15,18,24,.82);--text:#fff;--muted:rgba(255,255,255,.82)}
  *{box-sizing:border-box}
  html,body{width:100%;height:100%;margin:0;overflow:hidden;background:transparent;font-family:Inter,Arial,sans-serif}
  body{display:flex;align-items:center;justify-content:center;padding:10px}
  .widget{width:min(760px,100%);filter:drop-shadow(0 8px 22px rgba(0,0,0,.32))}
  .above{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:0 8px 8px;color:var(--text);font-weight:800;text-shadow:0 2px 8px rgba(0,0,0,.8)}
  .above.hidden{display:none}
  .bar{position:relative;height:58px;border:1px solid rgba(255,255,255,.15);border-radius:16px;background:var(--track);overflow:hidden;backdrop-filter:blur(12px)}
  .fill{position:absolute;inset:0 auto 0 0;width:0%;background:linear-gradient(90deg,var(--fill),#73f1a9);border-radius:inherit;transition:width .8s cubic-bezier(.22,.85,.25,1);will-change:width}
  .shine{position:absolute;inset:0;background:linear-gradient(105deg,transparent 35%,rgba(255,255,255,.22) 50%,transparent 65%);transform:translateX(-120%);animation:shine 4s ease-in-out infinite;pointer-events:none}
  @keyframes shine{0%,55%{transform:translateX(-120%)}85%,100%{transform:translateX(120%)}}
  .inside{position:absolute;inset:0;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 18px;color:var(--text);font-weight:900;text-shadow:0 2px 8px rgba(0,0,0,.72);pointer-events:none}
  .inside.left{text-align:left}.inside.center{text-align:center}.inside.right{text-align:right}
  .label{grid-column:1/4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .count{grid-column:1/4;white-space:nowrap}
  .inside.both .label{grid-column:1/3;text-align:left}.inside.both .count{grid-column:3;text-align:right}
  .hidden{display:none!important}
  .invalid{display:none;color:#fff;background:rgba(130,12,24,.9);padding:14px 18px;border-radius:12px;font-weight:800;text-align:center}
  .widget.numbers .bar{height:auto;min-height:74px;border:0;background:transparent;backdrop-filter:none;overflow:visible}.widget.numbers .fill,.widget.numbers .shine{display:none}.widget.numbers .inside{position:relative;min-height:74px;display:flex;flex-direction:column;justify-content:center;padding:8px}.widget.numbers .count{font-size:var(--goal-font,32px);color:var(--fill)}
  .widget.compact{width:auto;min-width:190px}.widget.compact .bar{height:46px;border-radius:999px}.widget.compact .inside{padding:0 15px}.widget.compact .above{display:none!important}
  .widget.circle{width:210px;height:210px}.widget.circle .above{justify-content:center;margin-bottom:8px}.widget.circle .bar{width:170px;height:170px;margin:auto;border-radius:50%;background:conic-gradient(var(--fill) var(--goal-pct,0%),var(--track) 0);display:grid;place-items:center;overflow:visible}.widget.circle .bar:after{content:"";position:absolute;inset:17px;border-radius:50%;background:rgba(7,10,18,.92)}.widget.circle .fill,.widget.circle .shine{display:none}.widget.circle .inside{z-index:2;display:flex;flex-direction:column;justify-content:center;padding:24px}.widget.circle .count{font-size:var(--goal-font,32px);color:var(--fill)}
</style>
</head>
<body>
<div class="widget" id="widget">
  <div class="above" id="above"><span id="aboveLabel"></span><span id="aboveCount"></span></div>
  <div class="bar">
    <div class="fill" id="fill"></div><div class="shine"></div>
    <div class="inside both center" id="inside"><span class="label" id="insideLabel"></span><span class="count" id="insideCount"></span></div>
  </div>
  <div class="invalid" id="invalid">Ce lien d’overlay n’est plus valide.</div>
</div>
<script src="/socket.io/socket.io.js"></script>
<script>
const slug = window.__STREAMER_SLUG__ || new URLSearchParams(location.search).get('streamer') || (location.pathname.match(/^\/s\/([^/]+)/)||[])[1] || '';
const apiUrl = p => p + (p.includes('?') ? '&' : '?') + 'streamer=' + encodeURIComponent(slug);
const socket = io({ transports:['websocket','polling'], query: slug ? {streamer:slug} : {} });
let last = null;
const $ = id => document.getElementById(id);
function countText(d){
  const current = Number(d.current ?? d.total ?? 0), target = Math.max(1,Number(d.target||50));
  if(d.progressDisplay==='percent') return Math.round(current/target*100)+'%';
  if(d.progressDisplay==='hidden') return '';
  return d.showTarget===false?String(current):(current+' / '+target);
}
function render(d){
  if(!d) return; last=d;
  const current=Math.max(0,Number(d.current ?? d.total ?? 0));
  const target=Math.max(1,Number(d.target||50));
  const pct=Math.max(0,Math.min(100,current/target*100));
  const style=['bar','numbers','compact','circle'].includes(d.style)?d.style:'bar';
  $('widget').className='widget '+style;
  $('widget').style.setProperty('--goal-font',Math.max(18,Math.min(72,Number(d.fontSize)||32))+'px');
  $('widget').style.setProperty('--fill',/^#[0-9a-f]{6}$/i.test(String(d.primaryColor||''))?d.primaryColor:'#26e07f');
  $('widget').style.setProperty('--goal-pct',pct+'%');
  $('fill').style.width=pct+'%';
  const label=String(d.label||'Sub Goal'); const count=countText(d);
  $('aboveLabel').textContent=label; $('aboveCount').textContent=count;
  $('insideLabel').textContent=label; $('insideCount').textContent=count;
  const tp=d.textPosition||'inside', cp=d.countPosition||'inside', align=d.textAlign||'center';
  $('aboveLabel').classList.toggle('hidden',tp!=='above');
  $('aboveCount').classList.toggle('hidden',cp!=='above'&&cp!=='right');
  $('above').classList.toggle('hidden',tp!=='above'&&cp!=='above'&&cp!=='right');
  $('insideLabel').classList.toggle('hidden',tp!=='inside');
  $('insideCount').classList.toggle('hidden',cp!=='inside');
  $('inside').className='inside '+align+((tp==='inside'&&cp==='inside')?' both':'');
}
async function load(){
  try{
    const r=await fetch(apiUrl('/api/widgets/subgoal?ts='+Date.now()),{cache:'no-store'});
    if(r.status===401||r.status===403||r.status===404){$('invalid').style.display='block';$('above').style.display='none';document.querySelector('.bar').style.display='none';return;}
    render(await r.json());
  }catch(e){}
}
socket.on('subgoal-update',render);
socket.on('connect',()=>{ if(slug) socket.emit('tenant-join',slug); load(); });
setInterval(load,30000); // simple resynchronisation de sécurité, pas d'animation saccadée
load();
</script>
</body>
</html>
