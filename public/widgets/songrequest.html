<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Song Request</title>
<style>
  html,body{margin:0;background:transparent;font-family:Inter,Arial,sans-serif;color:#fff;overflow:hidden}
  .wrap{width:585px;min-height:148px;padding:8px;box-sizing:border-box}
  .card{position:relative;overflow:hidden;border-radius:22px;padding:15px 18px;background:linear-gradient(135deg,rgba(7,18,34,.96),rgba(22,14,58,.9) 55%,rgba(3,32,34,.92));border:1px solid rgba(147,197,253,.34);box-shadow:0 20px 50px rgba(0,0,0,.48),inset 0 1px 0 rgba(255,255,255,.08)}
  .card:before{content:"";position:absolute;inset:-80px;background:radial-gradient(circle at 92% 10%,rgba(139,92,246,.28),transparent 34%),radial-gradient(circle at 70% 115%,rgba(45,212,191,.22),transparent 42%);pointer-events:none}
  .statusDot{position:absolute;right:17px;top:15px;width:8px;height:8px;border-radius:50%;background:#22c55e;box-shadow:0 0 16px rgba(34,197,94,.9);opacity:.95}
  .statusDot.paused{background:#f59e0b;box-shadow:0 0 16px rgba(245,158,11,.9)}
  .row{position:relative;z-index:2;display:flex;gap:14px;align-items:center}
  .thumb{width:88px;height:56px;border-radius:10px;object-fit:cover;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.05);box-shadow:0 10px 22px rgba(0,0,0,.35)}
  .meta{min-width:0;flex:1}.topline{display:flex;align-items:center;gap:8px;margin-bottom:6px}.pill{font-size:9px;font-weight:950;letter-spacing:1px;text-transform:uppercase;padding:4px 9px;border-radius:999px;background:rgba(147,197,253,.13);border:1px solid rgba(147,197,253,.24);color:#bfdbfe}.state{font-size:10px;font-weight:900;text-transform:uppercase;color:rgba(255,255,255,.68)}
  .song{font-size:19px;line-height:1.08;font-weight:950;letter-spacing:-.35px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-shadow:0 2px 12px rgba(0,0,0,.45)}
  .by{margin-top:5px;font-size:11px;color:rgba(226,232,240,.72);font-weight:750;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .barWrap{position:relative;z-index:2;margin-top:12px}.bar{height:9px;border-radius:999px;background:rgba(255,255,255,.2);box-shadow:inset 0 1px 4px rgba(0,0,0,.5);overflow:hidden}.fill{width:0%;height:100%;border-radius:999px;background:linear-gradient(90deg,#60a5fa,#8b5cf6,#2dd4bf);transition:width .25s linear}.times{display:flex;justify-content:space-between;margin-top:5px;font-size:11px;color:rgba(226,232,240,.75);font-weight:850}
  .next{position:relative;z-index:2;margin-top:11px;border:1px solid rgba(147,197,253,.15);background:rgba(15,23,42,.46);border-radius:14px;padding:9px 12px;font-size:11px;color:rgba(226,232,240,.7);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.empty .song{color:rgba(226,232,240,.78)}.empty .fill{width:0!important}
  #yt-holder{position:absolute;left:-9999px;top:-9999px;width:1px;height:1px;opacity:0;pointer-events:none}
</style>
</head>
<body>
<div id="yt-holder"><div id="yt-player"></div></div>
<div class="wrap"><div class="card empty" id="card"><div class="statusDot" id="dot"></div><div class="row"><img class="thumb" id="thumb" alt=""/><div class="meta"><div class="topline"><span class="pill">Song Request</span><span class="state" id="stateTxt">En attente</span></div><div class="song" id="song">Aucune musique en cours</div><div class="by" id="by">Utilise !sr + lien/titre dans le chat</div></div></div><div class="barWrap"><div class="bar"><div class="fill" id="fill"></div></div><div class="times"><span id="curTime">0:00</span><span id="durTime">0:00</span></div></div><div class="next" id="next" style="display:none"></div></div></div>
<script src="/socket.io/socket.io.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>
<script>

const STREAMER_SLUG=(location.pathname.match(/^\/s\/([^\/]+)/)||[])[1]||new URLSearchParams(location.search).get('streamer')||'';
function apiUrl(path){const sep=path.includes('?')?'&':'?';return STREAMER_SLUG?path+sep+'streamer='+encodeURIComponent(STREAMER_SLUG):path;}
const el={card:document.getElementById('card'),dot:document.getElementById('dot'),thumb:document.getElementById('thumb'),song:document.getElementById('song'),by:document.getElementById('by'),next:document.getElementById('next'),fill:document.getElementById('fill'),cur:document.getElementById('curTime'),dur:document.getElementById('durTime'),state:document.getElementById('stateTxt')};
let player=null, ytReady=false, lastSeq=0, currentVideoId='', currentItemId='', desiredStatus='stopped', queue=[], enabled=false, volume=100, freezeTime=null, lastPost=0, suppressNextState=false, displayTime=0, lastTick=Date.now(), loadGuardUntil=0, lastServerItemId='';
function esc(v){return String(v||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function fmt(s){s=Math.max(0,Math.floor(Number(s)||0));return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}
function vid(item){if(!item)return''; if(item.videoId)return item.videoId; const str=String(item.url||item.song||''); let m=str.match(/[?&]v=([\w-]{11})/)||str.match(/youtu\.be\/([\w-]{11})/)||str.match(/shorts\/([\w-]{11})/)||str.match(/^([\w-]{11})$/); return m?m[1]:'';}
function pstate(){try{return player&&player.getPlayerState?player.getPlayerState():-999}catch(e){return-999}}
function ptime(){try{return player&&player.getCurrentTime?Number(player.getCurrentTime()||0):0}catch(e){return 0}}
function pdur(){try{return player&&player.getDuration?Number(player.getDuration()||0):0}catch(e){return 0}}
function nowMs(){return Date.now();}
function rawPlayerTime(){return Math.max(0,ptime());}
function getStableTime(){
  const n=nowMs();
  const dur=pdur()||Number(queue[0]?.duration||0)||0;
  if(desiredStatus==='paused') return Math.max(0,freezeTime!==null?freezeTime:displayTime);
  if(desiredStatus==='playing' && n>loadGuardUntil){
    const rt=rawPlayerTime();
    // Ignore les valeurs YouTube absurdes juste après un load/refresh qui faisaient sauter la barre au milieu puis revenir au début.
    if(Number.isFinite(rt) && (rt>=displayTime-1.25 || displayTime<1.5)) displayTime=rt;
    else displayTime += Math.min(1, Math.max(0,(n-lastTick)/1000));
  }
  lastTick=n;
  if(dur) displayTime=Math.min(displayTime,dur);
  return Math.max(0,displayTime);
}
function setStableTime(sec){displayTime=Math.max(0,Number(sec)||0); lastTick=nowMs();}
function freeze(){ if(freezeTime===null) freezeTime=getStableTime(); }
function unfreeze(){ freezeTime=null; lastTick=nowMs(); }
function render(){const cur=queue[0], nxt=queue[1]; el.card.classList.toggle('empty',!cur); el.dot.classList.toggle('paused', desiredStatus==='paused'); el.state.textContent=!cur?'En attente':desiredStatus==='paused'?'Pause':'En lecture'; el.thumb.src=cur?.thumbnail||''; el.thumb.style.visibility=cur?.thumbnail?'visible':'hidden'; el.song.innerHTML=esc(cur?.title||cur?.song||'Aucune musique en cours'); el.by.innerHTML=cur?'Demandé par '+esc(cur.username||'Anonyme')+(cur.author?' · '+esc(cur.author):''):'Utilise !sr + lien/titre dans le chat'; if(nxt){el.next.style.display='block';el.next.innerHTML='À suivre : '+esc(nxt.title||nxt.song)+' — '+esc(nxt.username||'Anonyme')}else el.next.style.display='none'; updateTimeUI();}
function updateTimeUI(){const dur=pdur()||Number(queue[0]?.duration||0)||0; const cur=getStableTime(); el.cur.textContent=fmt(cur); el.dur.textContent=fmt(dur); el.fill.style.width=dur?Math.min(100,Math.max(0,(cur/dur)*100))+'%':'0%';}
function ensurePlayer(){if(player||!ytReady)return; player=new YT.Player('yt-player',{height:'1',width:'1',videoId:'',playerVars:{autoplay:1,controls:0,disablekb:1,fs:0,modestbranding:1,playsinline:1,rel:0,enablejsapi:1,origin:location.origin},events:{onReady:()=>{try{player.unMute();player.setVolume(volume)}catch(e){} applyPlayback('ready')},onStateChange:onPlayerStateChange,onError:()=>setTimeout(()=>nextPublic(),800)}})}
function applyPlayback(reason){ if(!player||!enabled||!queue[0]){stopLocal();return;} const cur=queue[0], id=vid(cur); if(!id)return; try{player.setVolume(volume)}catch(e){} if(currentItemId!==cur.id||currentVideoId!==id){currentItemId=cur.id; currentVideoId=id; freezeTime=null; setStableTime(0); loadGuardUntil=Date.now()+1800; suppressNextState=true; try{player.loadVideoById({videoId:id,startSeconds:0});}catch(e){} setTimeout(()=>{suppressNextState=false; desiredStatus==='paused'?pauseLocal():playLocal();},650); return;} desiredStatus==='paused'?pauseLocal():playLocal(); }
function playLocal(){ if(!player)return; desiredStatus='playing'; unfreeze(); try{ if(pstate()!==YT.PlayerState.PLAYING && pstate()!==YT.PlayerState.BUFFERING) player.playVideo(); player.unMute(); player.setVolume(volume);}catch(e){} render(); }
function pauseLocal(){ if(!player)return; desiredStatus='paused'; freeze(); try{ if(pstate()!==YT.PlayerState.PAUSED) player.pauseVideo(); }catch(e){} render(); }
function stopLocal(){ desiredStatus='stopped'; freezeTime=null; currentItemId=''; currentVideoId=''; setStableTime(0); try{ if(player&&player.stopVideo) player.stopVideo(); }catch(e){} render(); }
function onPlayerStateChange(e){ if(suppressNextState)return; if(e.data===YT.PlayerState.PLAYING && desiredStatus==='paused'){ pauseLocal(); return; } if(e.data===YT.PlayerState.PAUSED && desiredStatus==='playing'){ setTimeout(()=>{ if(desiredStatus==='playing') playLocal(); },180); return; } if(e.data===YT.PlayerState.ENDED){ postState('ended',true); nextPublic(); return; } postState(desiredStatus,false); render(); }
async function postState(status,force){const now=Date.now(); if(!force&&now-lastPost<900)return; lastPost=now; const cur=queue[0]; if(!cur)return; const t=getStableTime(); const d=pdur()||Number(cur.duration||0)||0; fetch(apiUrl('/api/widgets/songrequest/player-state'),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({itemId:cur.id,status,currentTime:t,duration:d,volume})}).catch(()=>{});}
async function nextPublic(){try{await fetch(apiUrl('/api/widgets/songrequest/next'),{method:'POST'});}catch(e){}}
function applyServerState(st,initial=false){enabled=!!st.enabled; const oldItem=queue[0]?.id||''; queue=Array.isArray(st.queue)?st.queue:[]; volume=Number(st.player?.volume??volume)||100; const srvStatus=st.player?.status; const newItem=queue[0]?.id||''; if(newItem && newItem!==oldItem){setStableTime(0); loadGuardUntil=Date.now()+1800;} if(initial || !queue[0]) desiredStatus=queue[0]?(srvStatus==='paused'?'paused':srvStatus==='stopped'?'stopped':'playing'):'stopped'; if(!queue[0]) stopLocal(); else {ensurePlayer(); applyPlayback('server');} render();}
async function load(initial=false){try{const r=await fetch(apiUrl('/api/widgets/songrequest?ts='+Date.now()),{cache:'no-store'}); const st=await r.json(); applyServerState(st,initial);}catch(e){}}
function handleControl(c){ if(!c||Number(c.seq||0)<=lastSeq)return; lastSeq=Number(c.seq||0); const a=String(c.action||''); if(a==='pause'){desiredStatus='paused'; pauseLocal(); postState('paused',true);} else if(a==='play'){desiredStatus='playing'; applyPlayback('play'); postState('playing',true);} else if(a==='stop'){stopLocal(); postState('stopped',true);} else if(a==='next'||a==='load-current'){load(false);} else if(a==='seek'){try{const sec=Math.max(0,Number(c.seconds||0)); setStableTime(sec); freezeTime=desiredStatus==='paused'?sec:null; player&&player.seekTo&&player.seekTo(sec,true);}catch(e){} render(); postState(desiredStatus,true);} else if(a==='volume'){volume=Math.max(0,Math.min(100,Number(c.volume??100))); try{player&&player.setVolume&&player.setVolume(volume)}catch(e){} postState(desiredStatus,true);} }
window.onYouTubeIframeAPIReady=function(){ytReady=true; ensurePlayer();};
load(true); setInterval(()=>{updateTimeUI(); postState(desiredStatus,false)},700); setInterval(()=>load(false),8000);
try{const socket=io({transports:['websocket','polling']}); if(STREAMER_SLUG) socket.emit('tenant-join', STREAMER_SLUG); socket.on('songrequest-control',handleControl); socket.on('songrequest-update',d=>{const old=queue[0]?.id||''; queue=Array.isArray(d.queue)?d.queue:[]; if(!queue[0]) stopLocal(); else if((queue[0].id||'')!==old){ setStableTime(0); loadGuardUntil=Date.now()+1800; if(desiredStatus==='stopped') desiredStatus='playing'; applyPlayback('queue'); } render();}); socket.on('songrequest-player-state',st=>{ if(st&&st.volume!==undefined){volume=Number(st.volume)||volume; try{player&&player.setVolume&&player.setVolume(volume)}catch(e){}} });}catch(e){}
</script>
</body>
</html>
