<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Song Request</title>
<style>
  html,body{margin:0;background:transparent;font-family:Inter,Arial,sans-serif;color:#fff;overflow:hidden}
  .wrap{width:760px;min-height:190px;padding:18px;box-sizing:border-box}
  .card{position:relative;overflow:hidden;border-radius:28px;padding:18px 20px;background:linear-gradient(135deg,rgba(3,7,18,.92),rgba(10,18,35,.86) 55%,rgba(17,24,39,.78));border:1px solid rgba(148,163,184,.28);box-shadow:0 24px 65px rgba(0,0,0,.58), inset 0 1px 0 rgba(255,255,255,.08)}
  .card:before{content:"";position:absolute;inset:-2px;background:radial-gradient(circle at 15% 10%,rgba(96,165,250,.34),transparent 30%),radial-gradient(circle at 85% 0%,rgba(168,85,247,.22),transparent 34%),radial-gradient(circle at 55% 110%,rgba(34,197,94,.16),transparent 38%);pointer-events:none}
  .shine{position:absolute;left:-30%;top:0;width:30%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);transform:skewX(-18deg);animation:shine 5.5s infinite}
  @keyframes shine{0%,45%{left:-35%}70%,100%{left:110%}}
  .row{display:flex;gap:16px;align-items:center;position:relative;z-index:2;min-width:0}
  .thumb{width:132px;height:74px;border-radius:18px;background:rgba(148,163,184,.10);border:1px solid rgba(255,255,255,.16);overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:28px;box-shadow:0 14px 35px rgba(0,0,0,.35)}
  .thumb img{width:100%;height:100%;object-fit:cover}
  .content{min-width:0;flex:1}
  .top{display:flex;align-items:center;gap:9px;margin-bottom:7px}
  .badge{font-size:10px;font-weight:1000;letter-spacing:.9px;text-transform:uppercase;color:#dbeafe;background:rgba(59,130,246,.15);border:1px solid rgba(147,197,253,.28);border-radius:999px;padding:5px 9px;box-shadow:0 0 22px rgba(59,130,246,.18)}
  .state{font-size:9px;font-weight:1000;color:rgba(226,232,240,.72);text-transform:uppercase;letter-spacing:.8px}
  .song{font-size:24px;line-height:1.08;font-weight:1000;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.5px;text-shadow:0 3px 18px rgba(0,0,0,.45)}
  .by{margin-top:6px;font-size:12px;color:rgba(226,232,240,.75);font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bar{height:12px;background:rgba(255,255,255,.10);border-radius:999px;overflow:hidden;margin-top:14px;border:1px solid rgba(255,255,255,.12);box-shadow:inset 0 2px 7px rgba(0,0,0,.38)}
  .fill{height:100%;width:0%;background:linear-gradient(90deg,#60a5fa,#a78bfa,#34d399);border-radius:999px;transition:width .25s linear;box-shadow:0 0 28px rgba(96,165,250,.42)}
  .time{display:flex;justify-content:space-between;margin-top:7px;font-size:11px;color:rgba(226,232,240,.68);font-weight:900;font-variant-numeric:tabular-nums}
  .next{position:relative;z-index:2;margin-top:13px;padding:11px 13px;border:1px solid rgba(255,255,255,.10);background:rgba(15,23,42,.48);border-radius:16px;font-size:12px;color:rgba(226,232,240,.72);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:800}
  .empty .song{color:rgba(226,232,240,.78)}
  .pulse{position:absolute;right:20px;top:20px;width:10px;height:10px;border-radius:50%;background:#34d399;box-shadow:0 0 0 0 rgba(52,211,153,.55);animation:pulse 1.8s infinite;z-index:2}
  .paused .pulse{background:#f59e0b;box-shadow:0 0 0 0 rgba(245,158,11,.5)}
  .stopped .pulse{background:#64748b;animation:none}
  @keyframes pulse{70%{box-shadow:0 0 0 12px rgba(52,211,153,0)}100%{box-shadow:0 0 0 0 rgba(52,211,153,0)}}
  #yt-holder{position:absolute;width:320px;height:180px;left:-500px;top:-500px;opacity:.01;pointer-events:none;overflow:hidden}
</style>
</head>
<body>
  <div id="yt-holder"><div id="yt-player"></div></div>
  <div class="wrap">
    <div class="card stopped" id="card">
      <div class="shine"></div><div class="pulse" id="pulse"></div>
      <div class="row">
        <div class="thumb" id="thumb">🎵</div>
        <div class="content">
          <div class="top"><div class="badge">Song Request</div><div class="state" id="state">STOP</div></div>
          <div class="song" id="song">Aucune musique en attente</div>
          <div class="by" id="by">Utilise !sr + lien YouTube ou titre dans le chat</div>
          <div class="bar"><div class="fill" id="fill"></div></div>
          <div class="time"><span id="current">0:00</span><span id="duration">0:00</span></div>
        </div>
      </div>
      <div class="next" id="next" style="display:none"></div>
    </div>
  </div>
<script src="/socket.io/socket.io.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>
<script>
const songEl=document.getElementById('song'), byEl=document.getElementById('by'), nextEl=document.getElementById('next'), card=document.getElementById('card'), thumbEl=document.getElementById('thumb'), fillEl=document.getElementById('fill'), curEl=document.getElementById('current'), durEl=document.getElementById('duration'), stateEl=document.getElementById('state');
let player=null, ytReady=false, currentId='', currentSongId='', latestState={enabled:false, queue:[], player:{status:'stopped',volume:100,currentTime:0,duration:0}, control:{seq:0}}, lastStatePost=0, desiredStatus='stopped', lastControlSeq=0, lastSeekAt=0;
function esc(v){return String(v||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function fmt(seconds){ seconds=Math.max(0,Math.floor(Number(seconds||0))); const h=Math.floor(seconds/3600), m=Math.floor((seconds%3600)/60), s=seconds%60; return h?`${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`:`${m}:${String(s).padStart(2,'0')}`; }
function youtubeId(input){ const raw=String(input||''); const patterns=[/youtu\.be\/([A-Za-z0-9_-]{6,})/i,/youtube\.com\/watch\?[^\s]*v=([A-Za-z0-9_-]{6,})/i,/youtube\.com\/embed\/([A-Za-z0-9_-]{6,})/i,/youtube\.com\/shorts\/([A-Za-z0-9_-]{6,})/i,/youtube\.com\/live\/([A-Za-z0-9_-]{6,})/i]; for(const p of patterns){ const m=raw.match(p); if(m) return m[1]; } return ''; }
function itemVideoId(item){ return item?.videoId || youtubeId(item?.url || item?.song || ''); }
function ensurePlayer(){
  if(player || !ytReady) return;
  player = new YT.Player('yt-player', {
    height:'180', width:'320', videoId:'',
    playerVars:{autoplay:1,controls:0,disablekb:1,fs:0,modestbranding:1,playsinline:1,rel:0,enablejsapi:1,origin:location.origin},
    events:{ onReady:()=>{ try{player.setVolume(latestState.player?.volume ?? 100); player.unMute();}catch(e){} syncPlayback(true); }, onStateChange:onPlayerStateChange, onError:e=>{ console.warn('[SONGREQUEST] Erreur YouTube', e.data); setTimeout(()=>nextPublic(),700); } }
  });
}
function postPlayerState(force=false){
  if(!player || !latestState.queue[0]) return;
  const now=Date.now(); if(!force && now-lastStatePost<1200) return; lastStatePost=now;
  let currentTime=Number(latestState.player.currentTime||0), duration=Number(latestState.player.duration||0), status=desiredStatus;
  try{ currentTime=player.getCurrentTime?player.getCurrentTime():currentTime; duration=player.getDuration?player.getDuration():duration; const ps=player.getPlayerState(); if(ps===YT.PlayerState.PAUSED) status='paused'; if(ps===YT.PlayerState.PLAYING) status='playing'; if(ps===YT.PlayerState.ENDED) status='stopped'; }catch(e){}
  latestState.player={...(latestState.player||{}), currentTime, duration, status};
  fetch('/api/widgets/songrequest/player-state',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ itemId: latestState.queue[0].id, status, currentTime, duration, volume: latestState.player?.volume ?? 100 })}).catch(()=>{});
}
function nextPublic(){ fetch('/api/widgets/songrequest/next',{method:'POST'}).catch(()=>{}); }
function onPlayerStateChange(e){
  if(e.data===YT.PlayerState.PLAYING){ desiredStatus='playing'; latestState.player.status='playing'; postPlayerState(true); }
  if(e.data===YT.PlayerState.PAUSED){ desiredStatus='paused'; latestState.player.status='paused'; postPlayerState(true); }
  if(e.data===YT.PlayerState.ENDED){ desiredStatus='stopped'; latestState.player.status='stopped'; postPlayerState(true); nextPublic(); }
}
function stopPlayback(){ try{ if(player && player.stopVideo) player.stopVideo(); }catch(e){} currentId=''; currentSongId=''; desiredStatus='stopped'; latestState.player.status='stopped'; }
function enforcePlayback(){
  if(!player || !latestState.enabled || !latestState.queue[0]) return;
  try{
    const ps=player.getPlayerState();
    if(desiredStatus==='paused' && ps!==YT.PlayerState.PAUSED){ player.pauseVideo(); }
    if(desiredStatus==='playing' && ps!==YT.PlayerState.PLAYING && ps!==YT.PlayerState.BUFFERING){ player.playVideo(); }
    player.setVolume(latestState.player?.volume ?? 100);
  }catch(e){}
}
function syncPlayback(force=false){
  ensurePlayer();
  const cur=(latestState.queue||[])[0];
  const id = latestState.enabled && cur ? itemVideoId(cur) : '';
  if(!latestState.enabled || !cur || !id){ stopPlayback(); render(latestState); return; }
  if(!player || !player.loadVideoById) return;
  if(force || id!==currentId || cur.id!==currentSongId){
    currentId=id; currentSongId=cur.id;
    desiredStatus=(latestState.player?.status === 'paused') ? 'paused' : 'playing';
    try{
      player.loadVideoById({videoId:id, startSeconds:Math.max(0, Number(latestState.player?.currentTime||0))});
      setTimeout(()=>{ try{ player.unMute(); player.setVolume(latestState.player?.volume ?? 100); desiredStatus==='paused' ? player.pauseVideo() : player.playVideo(); }catch(e){} }, 500);
    }catch(e){}
  } else {
    if(latestState.player?.status==='paused') desiredStatus='paused';
    if(latestState.player?.status==='playing') desiredStatus='playing';
    enforcePlayback();
  }
}
function render(state={}){
  latestState={ enabled:!!state.enabled, queue:Array.isArray(state.queue)?state.queue:(latestState.queue||[]), player:Object.assign(latestState.player||{}, state.player||{}), control: state.control || latestState.control || {seq:0} };
  const cur=latestState.queue[0], next=latestState.queue[1];
  const status=latestState.player?.status || desiredStatus || 'stopped';
  card.classList.toggle('empty', !cur); card.classList.toggle('paused', status==='paused'); card.classList.toggle('stopped', !cur || status==='stopped');
  songEl.innerHTML=esc(cur?.title || cur?.song || 'Aucune musique en attente');
  thumbEl.innerHTML=cur?.thumbnail?`<img src="${esc(cur.thumbnail)}" onerror="this.parentNode.textContent='🎵'">`:'🎵';
  stateEl.textContent=status==='playing'?'EN LECTURE':status==='paused'?'PAUSE':'STOP';
  if(!latestState.enabled) byEl.innerHTML='Song Request désactivé dans le panel';
  else if(cur && !itemVideoId(cur)) byEl.innerHTML='Demandé par '+esc(cur.username||'Anonyme')+' — vidéo YouTube introuvable';
  else byEl.innerHTML=cur ? 'Demandé par '+esc(cur.username||'Anonyme')+(cur.author?' · '+esc(cur.author):'') : 'Utilise !sr + lien YouTube ou titre dans le chat';
  if(next){ nextEl.style.display='block'; nextEl.innerHTML='À suivre : '+esc(next.title||next.song)+' — '+esc(next.username||'Anonyme'); } else nextEl.style.display='none';
  updateProgress();
}
function updateProgress(){
  let current=Number(latestState.player?.currentTime||0), duration=Number(latestState.player?.duration||0);
  try{ if(player && player.getCurrentTime){ current=player.getCurrentTime()||current; duration=player.getDuration()||duration; latestState.player.currentTime=current; latestState.player.duration=duration; } }catch(e){}
  curEl.textContent=fmt(current); durEl.textContent=duration?fmt(duration):'?:??';
  fillEl.style.width=duration?Math.max(0,Math.min(100,(current/duration)*100))+'%':'0%';
}
function applySongRequestControl(cmd){
  if(!cmd || !cmd.action) return;
  const action=cmd.action;
  if(action==='pause'){ desiredStatus='paused'; latestState.player.status='paused'; try{ if(player && player.pauseVideo) player.pauseVideo(); }catch(e){} }
  if(action==='play'){ desiredStatus='playing'; latestState.player.status='playing'; try{ if(player && player.playVideo) player.playVideo(); }catch(e){} }
  if(action==='seek'){ const seconds=Number(cmd.seconds||0); latestState.player.currentTime=seconds; lastSeekAt=Date.now(); try{ if(player && player.seekTo) player.seekTo(seconds, true); }catch(e){} }
  if(action==='volume'){ latestState.player.volume=Number(cmd.volume ?? 100); try{ if(player && player.setVolume) player.setVolume(latestState.player.volume); }catch(e){} }
  if(action==='stop'){ stopPlayback(); }
  if(action==='next' || action==='load-current'){ load(true); return; }
  render(latestState); enforcePlayback(); postPlayerState(true);
}
function handleSongRequestControl(cmd){ const seq=Number(cmd?.seq||0); if(!cmd || !seq || seq<=lastControlSeq) return; lastControlSeq=seq; applySongRequestControl(cmd); }
async function load(force=false){try{const r=await fetch('/api/widgets/songrequest?ts='+Date.now(),{cache:'no-store'}); const d=await r.json(); render(d); handleSongRequestControl(d.control); syncPlayback(force);}catch(e){}}
window.onYouTubeIframeAPIReady=function(){ytReady=true; ensurePlayer();};
load(true); setInterval(()=>load(false),2000); setInterval(()=>{ updateProgress(); enforcePlayback(); postPlayerState(false); },1000);
try{ const socket=io({transports:['websocket','polling']}); socket.on('songrequest-update', d=>{ latestState.queue=Array.isArray(d.queue)?d.queue:latestState.queue; render(latestState); syncPlayback(true); }); socket.on('songrequest-player-state', p=>{ latestState.player=Object.assign(latestState.player||{},p||{}); render(latestState); enforcePlayback(); }); socket.on('songrequest-control', cmd=>handleSongRequestControl(cmd)); }catch(e){}
</script>
</body>
</html>
