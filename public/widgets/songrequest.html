<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Song Request</title>
<style>
  html,body{margin:0;background:transparent;font-family:Inter,Arial,sans-serif;color:#fff;overflow:hidden}
  .wrap{width:560px;min-height:126px;padding:14px;box-sizing:border-box}
  .card{position:relative;overflow:hidden;border-radius:22px;padding:16px 18px;background:linear-gradient(135deg,rgba(5,10,22,.92),rgba(10,22,48,.82));border:1px solid rgba(147,197,253,.35);box-shadow:0 18px 45px rgba(0,0,0,.45)}
  .glow{position:absolute;right:-55px;top:-70px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(59,130,246,.34),transparent 70%)}
  .top{display:flex;align-items:center;gap:10px;margin-bottom:10px;position:relative;z-index:2}
  .icon{width:36px;height:36px;border-radius:14px;display:flex;align-items:center;justify-content:center;background:rgba(59,130,246,.20);border:1px solid rgba(147,197,253,.32);font-size:18px}
  .label{font-size:10px;font-weight:900;letter-spacing:.8px;text-transform:uppercase;color:#93c5fd}
  .song{position:relative;z-index:2;font-size:20px;font-weight:950;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.3px}
  .by{position:relative;z-index:2;margin-top:5px;font-size:12px;color:rgba(226,232,240,.72);font-weight:700}
  .next{position:relative;z-index:2;margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.09);font-size:11px;color:rgba(226,232,240,.62);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .empty .song{color:rgba(226,232,240,.76)}
  #yt-holder{position:absolute;width:1px;height:1px;left:-9999px;top:-9999px;overflow:hidden;opacity:0;pointer-events:none}
</style>
</head>
<body>
  <div id="yt-holder"><div id="yt-player"></div></div>
  <div class="wrap">
    <div class="card" id="card">
      <div class="glow"></div>
      <div class="top"><div class="icon">🎵</div><div><div class="label">Song Request</div></div></div>
      <div class="song" id="song">Aucune musique en attente</div>
      <div class="by" id="by">Utilise !sr + lien YouTube/titre dans le chat</div>
      <div class="next" id="next" style="display:none"></div>
    </div>
  </div>
<script src="/socket.io/socket.io.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>
<script>
const songEl=document.getElementById('song'), byEl=document.getElementById('by'), nextEl=document.getElementById('next'), card=document.getElementById('card');
let player=null, ytReady=false, currentId='', currentSongId='', latestState={enabled:false, queue:[]};
function esc(v){return String(v||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function youtubeId(input){
  const raw=String(input||'');
  const patterns=[/youtu\.be\/([A-Za-z0-9_-]{6,})/i,/youtube\.com\/watch\?[^\s]*v=([A-Za-z0-9_-]{6,})/i,/youtube\.com\/embed\/([A-Za-z0-9_-]{6,})/i,/youtube\.com\/shorts\/([A-Za-z0-9_-]{6,})/i,/youtube\.com\/live\/([A-Za-z0-9_-]{6,})/i];
  for(const p of patterns){ const m=raw.match(p); if(m) return m[1]; }
  return '';
}
function ensurePlayer(){
  if(player || !ytReady) return;
  player = new YT.Player('yt-player', {
    height:'1', width:'1', videoId:'',
    playerVars:{autoplay:1,controls:0,disablekb:1,fs:0,modestbranding:1,playsinline:1,rel:0},
    events:{ onReady:()=>syncPlayback(), onStateChange:e=>{ if(e.data===YT.PlayerState.ENDED) console.log('[SONGREQUEST] Musique terminée'); } }
  });
}
function stopPlayback(){
  try{ if(player && player.stopVideo) player.stopVideo(); }catch(e){}
  currentId=''; currentSongId='';
}
function syncPlayback(){
  ensurePlayer();
  const cur=(latestState.queue||[])[0];
  const id = latestState.enabled && cur ? youtubeId(cur.url || cur.song) : '';
  if(!latestState.enabled || !cur){ stopPlayback(); return; }
  if(!id){ stopPlayback(); return; }
  if(!player || !player.loadVideoById) return;
  if(id!==currentId || cur.id!==currentSongId){
    currentId=id; currentSongId=cur.id;
    try{ player.loadVideoById(id); setTimeout(()=>{ try{ player.playVideo(); player.unMute(); player.setVolume(100); }catch(e){} }, 700); }catch(e){}
  }
}
function render(state={}){
  latestState={ enabled:!!state.enabled, queue:Array.isArray(state.queue)?state.queue:[] };
  const cur=latestState.queue[0], next=latestState.queue[1];
  card.classList.toggle('empty', !cur);
  songEl.innerHTML=esc(cur?.song || 'Aucune musique en attente');
  if(!latestState.enabled) byEl.innerHTML='Song Request désactivé dans le panel';
  else if(cur && !youtubeId(cur.url || cur.song)) byEl.innerHTML='Demandé par '+esc(cur.username||'Anonyme')+' — lecture audio : lien YouTube requis';
  else byEl.innerHTML=cur ? 'Demandé par '+esc(cur.username||'Anonyme') : 'Utilise !sr + lien YouTube dans le chat';
  if(next){ nextEl.style.display='block'; nextEl.innerHTML='Prochaine : '+esc(next.song)+' — '+esc(next.username||'Anonyme'); }
  else nextEl.style.display='none';
  syncPlayback();
}
async function load(){try{const r=await fetch('/api/widgets/songrequest?ts='+Date.now(),{cache:'no-store'}); const d=await r.json(); render(d);}catch(e){}}
window.onYouTubeIframeAPIReady=function(){ytReady=true; ensurePlayer(); syncPlayback();};
load(); setInterval(load,3000);
try{ const socket=io(); socket.on('songrequest-update', d=>render(Object.assign({}, latestState, d))); }catch(e){}
</script>
</body>
</html>
