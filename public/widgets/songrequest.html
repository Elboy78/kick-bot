<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Song Request</title>
<style>
  html,body{margin:0;background:transparent;font-family:Inter,Arial,sans-serif;color:#fff;overflow:hidden}
  .wrap{width:585px;min-height:148px;padding:8px;box-sizing:border-box}
  .card{position:relative;overflow:hidden;border-radius:22px;padding:15px 18px;background:linear-gradient(135deg,rgba(7,18,34,.96),rgba(22,14,58,.9) 55%,rgba(3,32,34,.92));border:1px solid rgba(147,197,253,.34);box-shadow:0 20px 50px rgba(0,0,0,.48),inset 0 1px 0 rgba(255,255,255,.08)}
  .card:before{content:"";position:absolute;inset:-80px;background:radial-gradient(circle at 92% 10%,rgba(139,92,246,.28),transparent 34%),radial-gradient(circle at 70% 115%,rgba(45,212,191,.22),transparent 42%);pointer-events:none}
  .statusDot{position:absolute;right:17px;top:15px;width:8px;height:8px;border-radius:50%;background:#22c55e;box-shadow:0 0 16px rgba(34,197,94,.9);opacity:.95}
  .statusDot.paused{background:#f59e0b;box-shadow:0 0 16px rgba(245,158,11,.9)}
  .row{position:relative;z-index:2;display:flex;gap:14px;align-items:center}
  .thumb{width:88px;height:56px;border-radius:10px;object-fit:cover;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.05);box-shadow:0 10px 22px rgba(0,0,0,.35)}
  .meta{min-width:0;flex:1}.topline{display:flex;align-items:center;gap:8px;margin-bottom:6px}.pill{font-size:9px;font-weight:950;letter-spacing:1px;text-transform:uppercase;padding:4px 9px;border-radius:999px;background:rgba(147,197,253,.13);border:1px solid rgba(147,197,253,.24);color:#bfdbfe}.state{font-size:10px;font-weight:900;text-transform:uppercase;color:rgba(255,255,255,.68)}
  .song{font-size:19px;line-height:1.08;font-weight:950;letter-spacing:-.35px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-shadow:0 2px 12px rgba(0,0,0,.45)}
  .by{margin-top:5px;font-size:11px;color:rgba(226,232,240,.72);font-weight:750;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .barWrap{position:relative;z-index:2;margin-top:12px}.bar{height:9px;border-radius:999px;background:rgba(255,255,255,.2);box-shadow:inset 0 1px 4px rgba(0,0,0,.5);overflow:hidden}.fill{width:0%;height:100%;border-radius:999px;background:linear-gradient(90deg,#60a5fa,#8b5cf6,#2dd4bf);transition:width .25s linear}.times{display:flex;justify-content:space-between;margin-top:5px;font-size:11px;color:rgba(226,232,240,.75);font-weight:850}
  .next{position:relative;z-index:2;margin-top:11px;border:1px solid rgba(147,197,253,.15);background:rgba(15,23,42,.46);border-radius:14px;padding:9px 12px;font-size:11px;color:rgba(226,232,240,.7);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.empty .song{color:rgba(226,232,240,.78)}.empty .fill{width:0!important}
  #yt-holder{position:absolute;left:-9999px;top:-9999px;width:1px;height:1px;opacity:0;pointer-events:none}
</style>
</head>
<body>
<div id="yt-holder"><div id="yt-player"></div></div>
<div class="wrap"><div class="card empty" id="card"><div class="statusDot" id="dot"></div><div class="row"><img class="thumb" id="thumb" alt=""/><div class="meta"><div class="topline"><span class="pill">Song Request</span><span class="state" id="stateTxt">En attente</span></div><div class="song" id="song">Aucune musique en cours</div><div class="by" id="by">Utilise !sr + lien/titre dans le chat</div></div></div><div class="barWrap"><div class="bar"><div class="fill" id="fill"></div></div><div class="times"><span id="curTime">0:00</span><span id="durTime">0:00</span></div></div><div class="next" id="next" style="display:none"></div></div></div>
<script src="/socket.io/socket.io.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>
<script>
// Song Request OBS — moteur stable V2
// Règles :
// 1) Le widget OBS est le seul lecteur YouTube.
// 2) Le panel ne lit pas la musique, il envoie uniquement des commandes.
// 3) Les commandes sont reçues par socket ET relues via polling léger pour éviter les pertes.
// 4) Le temps affiché est local et lissé. YouTube ne peut plus faire sauter la barre au milieu.

let STREAMER_SLUG=(location.pathname.match(/^\/s\/([^\/]+)/)||[])[1]||new URLSearchParams(location.search).get('streamer')||'';
let OVERLAY_TOKEN=(location.pathname.match(/^\/o\/([^\/]+)/)||[])[1]||new URLSearchParams(location.search).get('overlayToken')||'';
let srSocket=null, srJoinedRoom='';
function apiUrl(path){
  const params=[];
  if(STREAMER_SLUG) params.push('streamer='+encodeURIComponent(STREAMER_SLUG));
  if(OVERLAY_TOKEN) params.push('overlayToken='+encodeURIComponent(OVERLAY_TOKEN));
  if(!params.length) return path;
  return path+(path.includes('?')?'&':'?')+params.join('&');
}
function joinStreamerRoom(slug){ slug=String(slug||'').toLowerCase(); if(!slug||!srSocket||srJoinedRoom===slug)return; try{srSocket.emit('tenant-join', slug); srJoinedRoom=slug;}catch(e){} }
function adoptStreamer(slug){ slug=String(slug||'').toLowerCase(); if(!slug)return; if(!STREAMER_SLUG) STREAMER_SLUG=slug; joinStreamerRoom(STREAMER_SLUG); }

const el={card:document.getElementById('card'),dot:document.getElementById('dot'),thumb:document.getElementById('thumb'),song:document.getElementById('song'),by:document.getElementById('by'),next:document.getElementById('next'),fill:document.getElementById('fill'),cur:document.getElementById('curTime'),dur:document.getElementById('durTime'),state:document.getElementById('stateTxt')};
let player=null, ytReady=false, lastSeq=0;
let queue=[], enabled=false, currentItemId='', currentVideoId='';
let desiredStatus='stopped';
let volume=100;
let displayTime=0, duration=0, lastClock=Date.now();
let loadingUntil=0, lastStatePost=0, lastControlPoll=0, suppressStateUntil=0;
let overlayInvalid=false;

function esc(v){return String(v||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function fmt(s){s=Math.max(0,Math.floor(Number(s)||0));return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}
function vid(item){if(!item)return''; if(item.videoId)return item.videoId; const str=String(item.url||item.song||''); let m=str.match(/[?&]v=([\w-]{11})/)||str.match(/youtu\.be\/([\w-]{11})/)||str.match(/shorts\/([\w-]{11})/)||str.match(/^([\w-]{11})$/); return m?m[1]:'';}
function pstate(){try{return player&&player.getPlayerState?player.getPlayerState():-999}catch(e){return-999}}
function ptime(){try{return player&&player.getCurrentTime?Number(player.getCurrentTime()||0):0}catch(e){return 0}}
function pdur(){try{return player&&player.getDuration?Number(player.getDuration()||0):0}catch(e){return 0}}
function clampVol(v){v=Number(v);return Number.isFinite(v)?Math.max(0,Math.min(100,Math.round(v))):100;}

function invalidateOverlay(){
  overlayInvalid=true;
  queue=[]; enabled=false; desiredStatus='stopped';
  try{ if(player){ player.pauseVideo&&player.pauseVideo(); player.stopVideo&&player.stopVideo(); } }catch(e){}
  currentItemId=''; currentVideoId=''; duration=0; syncClockFrom(0);
  el.card.classList.add('empty'); el.dot.classList.add('paused');
  el.state.textContent='Lien expiré';
  el.song.textContent='Lien OBS régénéré';
  el.by.textContent='Copie le nouveau lien Song Request depuis le panel.';
  el.next.style.display='none'; el.fill.style.width='0%'; el.cur.textContent='0:00'; el.dur.textContent='0:00';
}

function syncClockFrom(sec){displayTime=Math.max(0,Number(sec)||0); lastClock=Date.now();}
function getSmoothTime(){
  const now=Date.now();
  if(desiredStatus==='playing' && queue[0]) {
    const delta=Math.max(0,Math.min(1.2,(now-lastClock)/1000));
    displayTime += delta;
    // Recalage doux uniquement si YouTube est chargé et vraiment loin.
    if(now>loadingUntil){
      const yt=ptime();
      if(Number.isFinite(yt) && yt>0 && Math.abs(yt-displayTime)>2.5) displayTime = displayTime*0.82 + yt*0.18;
    }
  }
  lastClock=now;
  if(duration>0) displayTime=Math.min(displayTime,duration);
  return Math.max(0,displayTime);
}
function render(){
  const cur=queue[0], nxt=queue[1];
  el.card.classList.toggle('empty',!cur);
  el.dot.classList.toggle('paused', desiredStatus==='paused');
  el.state.textContent=!cur?'En attente':desiredStatus==='paused'?'Pause':desiredStatus==='playing'?'En lecture':'Arrêt';
  el.thumb.src=cur?.thumbnail||''; el.thumb.style.visibility=cur?.thumbnail?'visible':'hidden';
  el.song.innerHTML=esc(cur?.title||cur?.song||'Aucune musique en cours');
  el.by.innerHTML=cur?'Demandé par '+esc(cur.username||'Anonyme')+(cur.author?' · '+esc(cur.author):''):'Utilise !sr + lien/titre dans le chat';
  if(nxt){el.next.style.display='block';el.next.innerHTML='À suivre : '+esc(nxt.title||nxt.song)+' — '+esc(nxt.username||'Anonyme')}else el.next.style.display='none';
  updateTimeUI();
}
function updateTimeUI(){
  const cur=getSmoothTime();
  const d=duration||Number(queue[0]?.duration||0)||pdur()||0;
  el.cur.textContent=fmt(cur); el.dur.textContent=fmt(d);
  el.fill.style.transition = desiredStatus==='playing' ? 'width .22s linear' : 'none';
  el.fill.style.width=d?Math.min(100,Math.max(0,(cur/d)*100))+'%':'0%';
}

function ensurePlayer(){
  if(player||!ytReady)return;
  player=new YT.Player('yt-player',{height:'1',width:'1',videoId:'',playerVars:{autoplay:1,controls:0,disablekb:1,fs:0,modestbranding:1,playsinline:1,rel:0,enablejsapi:1,origin:location.origin},events:{
    onReady:()=>{try{player.unMute();player.setVolume(volume)}catch(e){} applyPlayback('ready')},
    onStateChange:onPlayerStateChange,
    onError:()=>setTimeout(()=>nextPublic(),900)
  }});
}
function loadVideoForCurrent(){
  const cur=queue[0]; if(!player||!cur)return false;
  const id=vid(cur); if(!id)return false;
  if(currentItemId===cur.id && currentVideoId===id) return true;
  currentItemId=cur.id; currentVideoId=id; duration=Number(cur.duration||0)||0;
  syncClockFrom(0); loadingUntil=Date.now()+2200; suppressStateUntil=Date.now()+900;
  try{player.setVolume(volume); player.unMute(); player.loadVideoById({videoId:id,startSeconds:0});}catch(e){}
  return false;
}
function applyPlayback(reason){
  if(!enabled||!queue[0]){stopLocal(false);return;}
  ensurePlayer(); if(!player)return;
  const alreadyLoaded=loadVideoForCurrent();
  try{player.setVolume(volume)}catch(e){}
  if(desiredStatus==='paused') pauseLocal(false);
  else if(desiredStatus==='playing') {
    if(alreadyLoaded || Date.now()>loadingUntil-1700) playLocal(false);
    else setTimeout(()=>{ if(desiredStatus==='playing') playLocal(false); },650);
  }
  render();
}
function playLocal(report=true){
  if(!queue[0])return stopLocal(report);
  desiredStatus='playing'; lastClock=Date.now(); ensurePlayer();
  try{ if(player){player.unMute();player.setVolume(volume); if(pstate()!==YT.PlayerState.PLAYING) player.playVideo();} }catch(e){}
  render(); if(report) postState('playing',true);
}
function pauseLocal(report=true){
  desiredStatus='paused'; syncClockFrom(displayTime || ptime() || 0);
  try{ if(player && pstate()!==YT.PlayerState.PAUSED) player.pauseVideo(); }catch(e){}
  render(); if(report) postState('paused',true);
}
function stopLocal(report=true){
  desiredStatus='stopped'; currentItemId=''; currentVideoId=''; duration=0; syncClockFrom(0);
  try{ if(player&&player.stopVideo) player.stopVideo(); }catch(e){}
  render(); if(report) postState('stopped',true);
}
function setVolumeLocal(v, report=true){
  volume=clampVol(v);
  try{ if(player) player.setVolume(volume); }catch(e){}
  if(report) postState(desiredStatus,true);
}
function onPlayerStateChange(e){
  if(Date.now()<suppressStateUntil) return;
  const ytState = e.data;

  // IMPORTANT V2 : le lecteur OBS ne décide plus de l'état play/pause.
  // Le panel/Companion est la seule source de vérité.
  // YouTube déclenche parfois PAUSED/PLAYING pendant un loadVideoById ou un buffering ;
  // avant, ces événements écrasaient desiredStatus et créaient la boucle Pause/Lecture.
  if(ytState===YT.PlayerState.PLAYING){
    const d=pdur(); if(d) duration=d;
    syncClockFrom(ptime());
    if(desiredStatus==='paused') {
      try{ player&&player.pauseVideo&&player.pauseVideo(); }catch(e){}
    }
    postState(desiredStatus || 'playing', false);
    render();
    return;
  }

  if(ytState===YT.PlayerState.PAUSED){
    syncClockFrom(ptime());
    if(desiredStatus==='playing') {
      // Pause involontaire de YouTube : on relance sans changer l'état serveur.
      setTimeout(()=>{
        if(!overlayInvalid && desiredStatus==='playing' && player && pstate()!==YT.PlayerState.PLAYING){
          try{ player.playVideo(); }catch(e){}
        }
      }, 180);
    }
    postState(desiredStatus || 'paused', false);
    render();
    return;
  }

  if(ytState===YT.PlayerState.ENDED){ postState('ended',true); nextPublic(); return; }
}

async function postState(status,force){
  if(overlayInvalid)return;
  const now=Date.now(); if(!force&&now-lastStatePost<1200)return; lastStatePost=now;
  const cur=queue[0]; if(!cur)return;
  const d=duration||pdur()||Number(cur.duration||0)||0;
  // Le widget ne remonte plus le volume : seul le panel/Companion décide du volume.
  fetch(apiUrl('/api/widgets/songrequest/player-state'),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({itemId:cur.id,status,currentTime:getSmoothTime(),duration:d})}).catch(()=>{});
}
async function nextPublic(){if(overlayInvalid)return;try{const r=await fetch(apiUrl('/api/widgets/songrequest/next'),{method:'POST'}); if(r.status===410) invalidateOverlay();}catch(e){}}
function applyServerState(st,initial=false){
  if(overlayInvalid)return;
  if(st?.invalidOverlay){invalidateOverlay();return;}
  if(st?.streamer) adoptStreamer(st.streamer);
  enabled=!!st.enabled;
  const oldId=queue[0]?.id||'';
  queue=Array.isArray(st.queue)?st.queue:[];
  const newId=queue[0]?.id||'';
  const pv=st.player||{};
  if(Number.isFinite(Number(pv.volume))) volume=clampVol(pv.volume);
  if(newId!==oldId){ currentItemId=''; currentVideoId=''; duration=Number(queue[0]?.duration||pv.duration||0)||0; syncClockFrom(0); desiredStatus=queue[0]?(pv.status==='paused'?'paused':'playing'):'stopped'; }
  else if(initial){ desiredStatus=queue[0]?(pv.status==='paused'?'paused':pv.status==='stopped'?'stopped':'playing'):'stopped'; syncClockFrom(Number(pv.currentTime||0)); duration=Number(pv.duration||queue[0]?.duration||0)||0; }
  if(!queue[0]) stopLocal(false); else applyPlayback('server');
  render();
  if(st.control) handleControl(st.control);
}
async function load(initial=false){if(overlayInvalid)return;try{const r=await fetch(apiUrl('/api/widgets/songrequest?ts='+Date.now()),{cache:'no-store'}); if(r.status===410){invalidateOverlay();return;} const st=await r.json(); if(st?.invalidOverlay){invalidateOverlay();return;} applyServerState(st,initial);}catch(e){}}
function handleControl(c){
  if(overlayInvalid||!c)return;
  if(c.streamer){ adoptStreamer(c.streamer); if(STREAMER_SLUG&&String(c.streamer).toLowerCase()!==String(STREAMER_SLUG).toLowerCase())return; }
  const seq=Number(c.seq||0); if(seq && seq<=lastSeq)return; if(seq) lastSeq=seq;
  const a=String(c.action||'');
  if(a==='pause'){pauseLocal(false);} 
  else if(a==='play'){desiredStatus='playing'; applyPlayback('play'); playLocal(false);} 
  else if(a==='stop'){stopLocal(false);} 
  else if(a==='next'||a==='load-current'){load(false);} 
  else if(a==='seek'){const sec=Math.max(0,Number(c.seconds||0)); syncClockFrom(sec); try{player&&player.seekTo&&player.seekTo(sec,true);}catch(e){} render();} 
  else if(a==='volume'){setVolumeLocal(c.volume,false);} 
}
async function pollControl(){
  if(overlayInvalid)return;
  const now=Date.now(); if(now-lastControlPoll<650)return; lastControlPoll=now;
  try{const r=await fetch(apiUrl('/api/widgets/songrequest?controlOnly=1&ts='+Date.now()),{cache:'no-store'}); if(r.status===410){invalidateOverlay();return;} const st=await r.json(); if(st?.invalidOverlay){invalidateOverlay();return;} if(st?.streamer) adoptStreamer(st.streamer); if(st?.control) handleControl(st.control); if(st?.player&&Number.isFinite(Number(st.player.volume))) setVolumeLocal(st.player.volume,false);}catch(e){}
}

window.onYouTubeIframeAPIReady=function(){ytReady=true; ensurePlayer(); applyPlayback('yt-ready');};
load(true);
setInterval(()=>updateTimeUI(),250);
setInterval(()=>postState(desiredStatus,false),2000);
setInterval(()=>load(false),15000);
try{
  srSocket=io({transports:['websocket','polling']});
  srSocket.on('connect',()=>joinStreamerRoom(STREAMER_SLUG));
  srSocket.on('songrequest-control',handleControl);
  srSocket.on('songrequest-update',d=>{ if(d?.streamer){adoptStreamer(d.streamer); if(STREAMER_SLUG&&String(d.streamer).toLowerCase()!==String(STREAMER_SLUG).toLowerCase())return;} load(false); });
  srSocket.on('songrequest-player-state',st=>{ if(overlayInvalid)return; if(st?.streamer){adoptStreamer(st.streamer); if(STREAMER_SLUG&&String(st.streamer).toLowerCase()!==String(STREAMER_SLUG).toLowerCase())return;} if(st&&Number.isFinite(Number(st.volume))) setVolumeLocal(st.volume,false); });
  srSocket.on('overlay-token-regenerated',d=>{ if(String(d?.widget||'').toLowerCase()==='songrequest' && OVERLAY_TOKEN) invalidateOverlay(); });
}catch(e){}
</script>
</body>
</html>
