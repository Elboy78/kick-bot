<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>⭐ Sub Counter</title>
<style>
  html,body{margin:0;padding:0;background:transparent;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif;color:#fff}
  #box{width:380px;padding:18px 20px;border-radius:22px;background:linear-gradient(135deg,rgba(12,12,18,.82),rgba(31,16,52,.72));border:1px solid rgba(255,255,255,.18);box-shadow:0 18px 40px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.10);backdrop-filter:blur(8px)}
  #top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  #title{font-size:16px;font-weight:900;text-transform:uppercase;letter-spacing:.8px;text-shadow:0 2px 8px rgba(0,0,0,.7)}
  #live{font-size:11px;font-weight:800;color:#9dffbf;background:rgba(30,255,120,.12);border:1px solid rgba(90,255,150,.26);padding:4px 8px;border-radius:999px}
  #total{font-size:48px;font-weight:950;line-height:1;text-shadow:0 0 22px rgba(150,80,255,.55)}
  #meta{display:flex;gap:8px;margin-top:12px}
  .pill{flex:1;padding:8px;border-radius:12px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.10);font-size:11px;color:#d7d7e5}
  .pill b{display:block;font-size:18px;color:#fff;margin-top:2px}
  #last{margin-top:10px;font-size:12px;color:#d9d6ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-shadow:0 1px 5px rgba(0,0,0,.8)}
  .pop{animation:pop .55s ease}
  @keyframes pop{0%{transform:scale(1)}35%{transform:scale(1.08)}100%{transform:scale(1)}}
</style>

<script>
window.__STREAMER_SLUG__ = window.__STREAMER_SLUG__ || new URLSearchParams(location.search).get('streamer') || (location.pathname.match(/^\/s\/([^\/]+)/)||[])[1] || '';
function tenantApiUrl(url){
  const slug = window.__STREAMER_SLUG__ || '';
  if(!slug) return url;
  return url + (url.includes('?') ? '&' : '?') + 'streamer=' + encodeURIComponent(slug);
}
function tenantSocketOptions(extra){
  const slug = window.__STREAMER_SLUG__ || '';
  return Object.assign({transports:['websocket','polling'], query: slug ? {streamer:slug} : {}}, extra || {});
}
</script>
</head>
<body>
<div id="box">
  <div id="top"><div id="title">⭐ Sub Counter</div><div id="live">LIVE</div></div>
  <div id="total">0</div>
  <div id="meta">
    <div class="pill">Session<b id="session">0</b></div>
    <div class="pill">Gifts<b id="gifts">0</b></div>
    <div class="pill">Renew<b id="renewals">0</b></div>
  </div>
  <div id="last">En attente d'un événement sub…</div>
</div>
<script src="/socket.io/socket.io.js"></script>
<script>
const socket=io(tenantSocketOptions());const box=document.getElementById('box');let lastTotal=null;
function esc(s){return String(s||'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]));}
function render(d){const total=Number(d.total||0), session=Number(d.session||0), gifts=Number(d.gifts||0), renewals=Number(d.renewals||0);document.getElementById('total').textContent=total;document.getElementById('session').textContent=session;document.getElementById('gifts').textContent=gifts;document.getElementById('renewals').textContent=renewals;const ev=(d.latest||[])[0];if(ev){document.getElementById('last').innerHTML=ev.type==='gift'?`🎁 ${esc(ev.username||ev.gifter||'Anonyme')} +${ev.count||1}`:ev.type==='renewal'?`🔄 ${esc(ev.username||'Quelqu\'un')} renouvelle`: `⭐ Nouveau sub : ${esc(ev.username||'Quelqu\'un')}`;}if(lastTotal!==null&&total>lastTotal){box.classList.remove('pop');void box.offsetWidth;box.classList.add('pop')}lastTotal=total;}
fetch(tenantApiUrl('/api/widgets/subcounter')).then(r=>r.json()).then(render).catch(()=>{});
socket.on('subcounter-update',render);
</script>
</body>
</html>
